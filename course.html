<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動課程看板</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
:root{
  --primary:#248dc5;
  --accent:#248dc5;
  --bg:#f5f6f7;
  --text:#2a2a2a;
  --muted:#9fa0a0;
  --line:#dcdddd;
  --gold:#eee800;
  --danger:#ff5757;
  --btn-dark:#2d2d2d;
  --gc-header:#2d2d2d;
  --gc-fill:#fffbee;
}

html { margin:0; padding:0; }
body{
  margin:0; padding:0;
  background:var(--bg);
  font-family:'Microsoft JhengHei','PingFang TC',Arial,sans-serif;
  color:var(--text);
  font-size:15px;
  line-height:1.6;
}

#measure-wrapper { width:100%; }

/* ── 篩選面板 ── */
.console-panel{
  background:#fff; border-radius:12px; padding:20px;
  box-shadow:0 4px 16px rgba(36,141,197,.10);
  border:1px solid var(--line); margin-top:16px;
}
.chip-group-label{ font-size:.9rem; font-weight:700; color:var(--btn-dark); margin-bottom:8px; display:block; }
.chip-container{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{
  padding:5px 13px; border-radius:50px; background:#f0f1f1;
  border:1.5px solid var(--line); font-size:.88rem; font-weight:600;
  color:var(--muted); cursor:pointer; transition:.18s;
}
.chip:hover{ border-color:var(--accent); color:var(--accent); }
.chip.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
.chip-attr.active{ background:var(--btn-dark); color:#fff; border-color:var(--btn-dark); }

/* ── 控制列 ── */
.control-bar{
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:10px; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);
}
.control-right{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.switch-box{
  background:#f0f1f1; border:1.5px solid var(--line);
  padding:5px 13px; border-radius:50px;
  display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:600; font-size:.88rem;
}
.btn-clear{
  background-color:var(--accent); color:#fff; border:none;
  font-weight:600; padding:6px 18px; border-radius:50px; cursor:pointer;
  text-decoration:none; display:inline-block; font-size:.88rem;
}
.btn-clear:hover{ background-color:var(--btn-dark); color:#fff; }

/* ── 上課方式標籤 ── */
.tag-real   { background:#fdecea; color:#a52020; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; white-space:nowrap; display:inline-block; }
.tag-online { background:#e1f5ee; color:#0a5e48; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; white-space:nowrap; display:inline-block; }
.tag-live   { background:#fff4e0; color:#6b4100; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; white-space:nowrap; display:inline-block; }

/* ── 分類彩色藥丸標籤 ── */
.cat-tag{
  display:inline-flex; align-items:center;
  padding:3px 9px; border-radius:20px;
  font-size:.78rem; font-weight:700; color:#fff; white-space:nowrap;
}

/* ── 分類 chip 群組 ── */
.cat-group{ margin-bottom:10px; }
.cat-group:last-child{ margin-bottom:0; }
.cat-group-label{
  font-size:.72rem; font-weight:700; color:#666;
  display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:.06em;
}

/* ── Header 資訊標籤 ── */
.gc-meta-label{
  font-size:10px; font-weight:400; opacity:.65;
  display:block; line-height:1.3; margin-bottom:1px;
}
.gc-meta-item{
  display:inline-flex; flex-direction:column; align-items:flex-start;
}
.gc-meta-row{
  display:flex; flex-wrap:wrap; gap:4px 16px; margin-bottom:3px;
}

/* ── 置頂徽章 ── */
.pin-badge{
  background:var(--gold); color:#2a2a2a; padding:3px 10px; border-radius:999px;
  font-size:.78rem; font-weight:700; display:inline-flex; align-items:center; gap:4px;
}

/* ── 價格文字 ── */
.price-text{ font-weight:700; color:var(--danger); font-size:1rem; white-space:nowrap; }

/* ── 行動按鈕 ── */
.item-actions{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.btn-cal-mini{
  background:var(--accent); color:#fff; border:none;
  padding:6px 12px; border-radius:6px;
  font-size:.82rem; font-weight:600; text-decoration:none;
  display:inline-flex; align-items:center; gap:5px;
}
.btn-cal-mini:hover{ background:var(--btn-dark); color:#fff; }
.btn-apply{
  background:var(--danger); color:#fff;
  padding:6px 14px; border-radius:6px;
  font-size:.82rem; font-weight:600; text-decoration:none;
  display:inline-flex; align-items:center; gap:5px;
}
.btn-apply:hover{ opacity:.85; color:#fff; }
.btn-apply-disabled{
  background:#dcdddd; color:#9fa0a0;
  padding:6px 14px; border-radius:6px;
  font-size:.82rem; font-weight:600;
  display:inline-flex; align-items:center; cursor:default;
}

/* ════════════════════════════════════════
   清單視圖（桌機）
   ════════════════════════════════════════ */
.list-item{
  background:#fff; border-radius:8px; padding:0;
  border:1px solid var(--line); margin-bottom:10px; cursor:default;
  transition:.18s; overflow:hidden;
}
.list-item.is-pinned{ border-color:var(--gold); border-width:2px; }
.list-item.is-past{ opacity:.5; filter:grayscale(.4); }
.list-item:hover{ border-color:var(--accent); box-shadow:0 2px 8px rgba(36,141,197,.12); }

/* 清單：深色 header（仿 課表.html） */
.list-header{
  background:var(--gc-header); color:#fff;
  padding:10px 16px 8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.list-header .date{ font-weight:bold; font-size:.92rem; flex:1; }
.list-header-sub{ font-size:.8rem; color:#e6c96a; font-weight:bold; margin-top:2px; }

/* 清單：課程列 */
.list-course-row{
  display:flex; align-items:center; gap:0;
  border-bottom:1px solid var(--line); padding:10px 16px;
}
.list-course-row:last-child{ border-bottom:none; }
.list-attr-cell{
  min-width:160px; max-width:220px; flex-shrink:0;
  display:flex; flex-wrap:wrap; gap:4px; padding-right:12px;
}
.list-name-cell{ flex:1; min-width:0; }
.list-title{ font-size:.95rem; font-weight:700; color:var(--btn-dark); line-height:1.5; }
.list-meta{ display:flex; flex-wrap:wrap; gap:8px; font-size:.85rem; color:var(--muted); font-weight:500; margin-top:4px; }
.list-meta i{ color:var(--accent); margin-right:3px; }
.list-price-cell{ min-width:80px; text-align:right; flex-shrink:0; padding-left:10px; }

/* ════════════════════════════════════════
   卡片視圖（手機）— 仿 課表.html gc-card
   ════════════════════════════════════════ */
.gc-card{
  border:1px solid rgba(0,0,0,.15);
  border-radius:8px; overflow:hidden; background:#fff;
  height:100%; display:flex; flex-direction:column;
  transition:.18s;
}
.gc-card.is-pinned{ border-color:var(--gold); border-width:2px; }
.gc-card.is-past{ opacity:.5; filter:grayscale(.4); }
.gc-card:hover{ box-shadow:0 4px 14px rgba(36,141,197,.14); }

.gc-card-header{
  padding:10px 14px 6px;
  background:var(--gc-header); color:#fff; font-size:14px;
}
.gc-card-header-row1{ display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.gc-card-header .date{ font-weight:bold; font-size:14px; flex:1; }
.gc-card-header-row2{ font-size:13px; color:#e6c96a; font-weight:bold; padding-bottom:2px; }
.gc-card-header-org{ font-size:12px; color:#ccc; padding-bottom:4px; }

.gc-card-body{ padding:10px 14px; flex:1; display:flex; flex-direction:column; }
.gc-card-row{
  display:flex; gap:8px; padding:7px 0;
  border-bottom:1px solid rgba(0,0,0,.06); align-items:center;
}
.gc-card-row:last-child{ border-bottom:none; }

.gc-card-attr{
  font-size:12px; font-weight:bold;
  color:#6b4900; background:var(--gc-fill);
  border-radius:3px; padding:3px 7px;
  flex-shrink:0; white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.gc-card-attr span{ display:block; line-height:1.5; }

.gc-card-name{ font-size:14px; color:#1a1a1a; line-height:1.6; flex:1; }
.gc-card-sub{ display:block; font-size:12px; color:#666; margin-top:2px; }

.gc-card-footer{
  margin-top:auto; padding:8px 14px;
  border-top:1px solid var(--line);
  display:flex; justify-content:flex-end; align-items:center;
  flex-wrap:wrap; gap:8px;
}
.gc-card-footer .price-text{ margin-right:auto; }
.gc-card-footer .item-actions{ margin-top:0; }

#listView{ display:block; }
#cardView{ display:none; }
@media (max-width:768px){
  #listView{ display:none; }
  #cardView{ display:flex; flex-wrap:wrap; }
  .control-bar{ flex-direction:column; text-align:center; }
  .control-right{ justify-content:center; width:100%; }
}
</style>
</head>
<body>

<div id="measure-wrapper">
  <div class="container mb-4 pt-3">
    <div class="console-panel">
      <div class="row g-3">
        <div class="col-lg-4">
          <label class="chip-group-label">關鍵字搜尋</label>
          <input type="text" id="searchInp" class="form-control border-2" placeholder="搜尋課程名稱、開辦單位...">
        </div>
        <div class="col-lg-4 col-6">
          <label class="chip-group-label">日期（自）</label>
          <input type="date" id="dateStart" class="form-control border-2">
        </div>
        <div class="col-lg-4 col-6">
          <label class="chip-group-label">日期（至）</label>
          <input type="date" id="dateEnd" class="form-control border-2">
        </div>
        <div class="col-12 mt-3 mb-2">
          <label class="chip-group-label"><i class="fa fa-chalkboard me-1"></i>上課方式</label>
          <div id="attrChips" class="chip-container"></div>
        </div>
        <div class="col-12">
          <label class="chip-group-label"><i class="fa fa-tags me-1"></i>課程分類篩選</label>
          <div id="catChips" class="chip-container"></div>
        </div>
      </div>

      <div class="control-bar">
        <div id="status-bar" class="fw-bold text-dark"></div>
        <div class="control-right">
          <label class="switch-box m-0">
            <input class="form-check-input mt-0" type="checkbox" id="showExpired">
            <span>顯示已結束</span>
          </label>
          <a href="#" class="btn-clear" id="btnClear">重置</a>
        </div>
      </div>
    </div>

    <div id="listView" class="mt-4"></div>
    <div id="cardView" class="row g-3 mt-3"></div>
  </div>
</div>

<script>
/* ============================================================
   ★★★ 設定區 ★★★
   ============================================================ */
const ORG_NAME = "GOGOCARE";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpBiAudLxLFajpgLVPwQexoGQH2bctwFks0cvh22eLZ7UCSoJ0netSqE1WTDKtrkdfroZ84EgI6lP7/pub?gid=0&single=true&output=csv";
/* ============================================================ */

/* ── 課程分類正規清單（分組顯示） ── */
const CAT_GROUPS = [
  {
    label: "積分主題",
    cats: ["專業課程", "專業品質", "專業倫理", "專業法規", "非積分課程", "積分申請中"]
  },
  {
    label: "特殊積分",
    cats: ["感染管制", "緊急應變", "消防安全", "性別敏感度",
           "原住民族文化敏感度及能力", "多元族群文化敏感度及能力", "其他"]
  }
];
const CANONICAL_CATS = CAT_GROUPS.flatMap(g => g.cats);

/* ── 標籤顯示縮短對照（僅顯示用，篩選邏輯仍用全名） ── */
const CAT_DISPLAY = {
  "原住民族文化敏感度及能力": "原住民族",
  "多元族群文化敏感度及能力": "多元族群",
};
function catDisplayLabel(tag) { return CAT_DISPLAY[tag] || tag; }

/* ── 縮寫 → 正規名稱對照表 ── */
const CAT_ALIAS = {
  "原住民族":   "原住民族文化敏感度及能力",
  "原住民":     "原住民族文化敏感度及能力",
  "原民":       "原住民族文化敏感度及能力",
  "多元族群":   "多元族群文化敏感度及能力",
  "多元":       "多元族群文化敏感度及能力",
  "性別":       "性別敏感度",
  "性平":       "性別敏感度",
  "性別敏感度": "性別敏感度",
  "感控":       "感染管制",
  "感染管制":   "感染管制",
  "消防":       "消防安全",
  "消防安全":   "消防安全",
  "法規":       "專業法規",
  "倫理":       "專業倫理",
  "申請中":     "積分申請中",
  "緊急應變":   "緊急應變",
  "非積分":     "非積分課程",
};

let db = [], selectedCats = [], selectedAttrs = [];
let lastUpdateTime = "";

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getColor(text) {
  const colors = ["#1d4ed8","#0891b2","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0f766e"];
  let h = 0;
  const s = String(text || "");
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

/* ── 標準化單一標籤（套用縮寫對照） ── */
function normalizeTag(t) {
  const s = t.trim().replace(/\s+/g, "");
  return CAT_ALIAS[s] || s;
}

/**
 * 解析「預計課程屬性、類別」欄位 → 正規化標籤陣列
 *
 * 支援格式：
 *   專業品質(多元族群文化敏感度及能力)
 *   專業品質\n(原住民族文化敏感度及能力、\n多元族群文化敏感度及能力)
 *   專業倫理／性別敏感度
 *   法規／倫理／性平\n消防／感控
 *   專業課程(緊急應變)
 */
function parseCategoryTags(raw) {
  if (!raw) return [];
  const tags = new Set();

  // 以換行切段（括號內不切）
  let depth = 0, cur = "", segments = [];
  for (let i = 0; i < raw.length; i++) {
    const ch = raw[i];
    if (ch === "(" || ch === "（") { depth++; cur += ch; }
    else if (ch === ")" || ch === "）") { depth--; cur += ch; }
    else if ((ch === "\n" || ch === "\r") && depth === 0) {
      if (cur.trim()) segments.push(cur.trim());
      cur = "";
    } else { cur += ch; }
  }
  if (cur.trim()) segments.push(cur.trim());

  for (const seg of segments) {
    const hasParen = /[（(]/.test(seg);

    if (!hasParen) {
      // 無括號：以 /／,，、 切分
      seg.split(/[\/／,，、]/).forEach(s => {
        const t = normalizeTag(s);
        if (t) tags.add(t);
      });
    } else {
      const pi = seg.search(/[（(]/);
      const closeIdx = Math.max(seg.lastIndexOf(")"), seg.lastIndexOf("）"));
      const main  = seg.slice(0, pi);
      const inner = seg.slice(pi + 1, closeIdx < 0 ? seg.length : closeIdx);

      // 括號前主體（可能含 / 分隔符）
      main.split(/[\/／,，、]/).forEach(s => {
        const t = normalizeTag(s);
        if (t) tags.add(t);
      });
      // 括號內容（可能含 /,，、及換行）
      inner.split(/[\/／,，、\n\r]/).forEach(s => {
        const t = normalizeTag(s);
        if (t) tags.add(t);
      });
    }
  }
  return Array.from(tags);
}

/* ── 上課方式 → CSS class ── */
function getTypeClass(type) {
  if (!type) return "";
  const t = type.trim();
  if (t.includes("實體"))  return "tag-real";
  if (t.includes("直播"))  return "tag-live";
  if (t.includes("線上") || t.includes("同步")) return "tag-online";
  return "tag-real";
}

/* ── 解析日期「2026/5/15 (四)」→「2026-05-15」── */
function parseDate(raw) {
  if (!raw) return "";
  const m = String(raw).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return m[1] + "-" + m[2].padStart(2,"0") + "-" + m[3].padStart(2,"0");
  return "";
}

/* ── 解析時間「18:00-21:00」→ { start, end } ── */
function parseTime(raw) {
  if (!raw) return { start:"", end:"" };
  const m = String(raw).match(/(\d{1,2}:\d{2})\s*[-~～]\s*(\d{1,2}:\d{2})/);
  if (m) return { start: m[1], end: m[2] };
  const m2 = String(raw).match(/(\d{1,2}:\d{2})/);
  if (m2) return { start: m2[1], end: "" };
  return { start:"", end:"" };
}

/* ── 欄位鬆散查找（支援多種欄位名稱變體） ── */
function getCol(row, ...keys) {
  for (const k of keys) {
    const v = row[k];
    if (v !== undefined && v !== null && String(v).trim() !== "") return String(v).trim();
  }
  return "";
}

/* ── 建立分類標籤 HTML（彩色藥丸，顯示縮短名稱） ── */
function buildCatTags(tags) {
  return tags.map(label =>
    '<span class="cat-tag" style="background:' + getColor(label) + ';" title="' + escHtml(label) + '">' +
    escHtml(catDisplayLabel(label)) + "</span>"
  ).join(" ");
}

/* ── 建立上課方式標籤 ── */
function buildTypeTag(type) {
  if (!type) return "";
  return '<span class="' + getTypeClass(type) + '">' + escHtml(type.trim()) + "</span>";
}

/* ── 判斷是否已結束 ── */
function isExpired(group) {
  const endDay  = group._date;
  const endTime = group._endTime || "23:59";
  if (!endDay) return false;
  return new Date() > new Date(endDay + " " + endTime);
}

/* ── 格式化價格 ── */
function priceText(v) {
  const raw = String(v == null ? "" : v).trim().replace(/,/g, "");
  if (!raw || raw === "None" || raw === "false") return "";
  if (/^0+(\.0+)?$/.test(raw)) return "免費";
  if (/^\d+(\.\d+)?$/.test(raw)) return "NT$" + Number(raw).toLocaleString();
  return raw;
}

/* ── Google 行事曆日期格式 ── */
function fmtCalDate(dateStr, timeStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm   = String(d.getMonth()+1).padStart(2,"0");
  const dd   = String(d.getDate()).padStart(2,"0");
  let hh = "00", min = "00";
  if (timeStr) {
    const m = timeStr.match(/(\d{1,2})[:：](\d{1,2})/);
    if (m) { hh = m[1].padStart(2,"0"); min = m[2].padStart(2,"0"); }
  }
  return yyyy + mm + dd + "T" + hh + min + "00";
}

/* ── 高度通知（iframe resize） ── */
let lastSentHeight = 0, heightNotifyTimer = null;

function getActualContentHeight() {
  const w = document.getElementById("measure-wrapper");
  return w ? Math.ceil(w.getBoundingClientRect().bottom) : 0;
}
function notifyHeight() {
  const h = getActualContentHeight();
  if (Math.abs(h - lastSentHeight) < 10 || h < 100) return;
  lastSentHeight = h;
  try { window.parent.postMessage({ type:"EVENT_BOARD_RESIZE", height:h }, "*"); } catch(e) {}
}
function scheduleNotify() {
  if (heightNotifyTimer) clearTimeout(heightNotifyTimer);
  heightNotifyTimer = setTimeout(notifyHeight, 100);
}

/* ════════════════════════════════════════
   init — 載入 CSV
   ════════════════════════════════════════ */
function init() {
  const now = new Date();
  lastUpdateTime = now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(res) {
      const rawRows = res.data.map(row => {
        const clean = {};
        // 清洗欄位名（移除換行）
        Object.keys(row).forEach(k => {
          const nk = k.replace(/[\r\n]+/g, "").trim();
          clean[nk] = row[k] ? String(row[k]).trim() : "";
        });
        return clean;
      });

      // ── 依 課程ID 分組；繼承父列的日期/時間 ──
      const groupMap = new Map();
      let lastId = "", lastDate = "", lastStartTime = "", lastEndTime = "";

      rawRows.forEach(row => {
        const id     = row["課程ID"] || ("_" + Math.random());
        const name   = row["課程名稱"] || row["活動主題"] || "";
        const attr   = row["預計課程屬性、類別"] || row["活動分類"] || "";
        const rawDate = row["預計日期"] || row["活動開始日期"] || "";
        const rawTime = row["預計時間"] || "";
        const t = parseTime(rawTime);

        if (rawDate) {
          lastId        = id;
          lastDate      = parseDate(rawDate);
          lastStartTime = t.start;
          lastEndTime   = t.end;
        }

        if (!groupMap.has(id)) {
          const date = rawDate ? parseDate(rawDate) : (id === lastId ? lastDate : "");
          const st   = rawDate ? t.start : (id === lastId ? lastStartTime : "");
          const et   = rawDate ? t.end   : (id === lastId ? lastEndTime   : "");

          groupMap.set(id, {
            _id:        id,
            _date:      date,
            _startTime: st,
            _endTime:   et,
            _format:    getCol(row, "上課方式", "活動屬性"),
            _hours:     getCol(row, "課程時數(小時)", "課程時數（小時）", "課程時數", "時數"),
            _pts:       getCol(row, "預計積分積數", "預計積分數", "積分積數", "積分數", "積分"),
            _fee:       getCol(row, "費用", "價格"),
            _org:       getCol(row, "開辦單位", "活動講師"),
            _status:    getCol(row, "課程狀態", "_status"),
            _applyUrl:  getCol(row, "報名連結"),
            _courses:   []
          });
        }

        if (name || attr) {
          const g = groupMap.get(id);
          // 繼承日期時間（子列可能無日期）
          if (!rawDate && !g._date && lastDate) {
            g._date      = lastDate;
            g._startTime = lastStartTime;
            g._endTime   = lastEndTime;
          }
          g._courses.push({ attr, name });
          // 更新費用/申請連結（子列可能補充）
          if (!g._fee)      g._fee      = getCol(row, "費用", "價格");
          if (!g._applyUrl) g._applyUrl = getCol(row, "報名連結");
          if (!g._pts)      g._pts      = getCol(row, "預計積分積數", "預計積分數", "積分積數", "積分數", "積分");
        }
      });

      db = Array.from(groupMap.values()).filter(g => g._courses.length > 0);
      setupFilters();
      render();
    },
    error() {
      const errHtml = '<div class="text-center py-5 text-muted"><i class="fa-solid fa-circle-exclamation fa-2x mb-3"></i><br>無法讀取資料，請確認 CSV 網址是否正確且已公開發布。</div>';
      document.getElementById("listView").innerHTML = errHtml;
      document.getElementById("cardView").innerHTML = '<div class="col-12">' + errHtml + "</div>";
      scheduleNotify();
    }
  });

  ["searchInp","dateStart","dateEnd","showExpired"].forEach(id => {
    document.getElementById(id).onchange = render;
    if (id === "searchInp") document.getElementById(id).oninput = render;
  });

  document.getElementById("btnClear").onclick = (e) => {
    e.preventDefault();
    document.getElementById("searchInp").value = "";
    document.getElementById("dateStart").value = "";
    document.getElementById("dateEnd").value = "";
    document.getElementById("showExpired").checked = false;
    selectedCats = []; selectedAttrs = [];
    setupFilters(); render();
  };

  window.addEventListener("resize", () => { render(); scheduleNotify(); });

  if (window.ResizeObserver) {
    const wrapper = document.getElementById("measure-wrapper");
    if (wrapper) new ResizeObserver(scheduleNotify).observe(wrapper);
  }
  window.addEventListener("load", scheduleNotify);
}

/* ════════════════════════════════════════
   setupFilters — 建立篩選 chips
   ════════════════════════════════════════ */
function setupFilters() {
  // 上課方式：動態從資料萃取
  const attrs = new Set();
  db.forEach(g => {
    if (g._status.includes("隱藏")) return;
    if (g._format) attrs.add(g._format.trim());
  });

  document.getElementById("attrChips").innerHTML = Array.from(attrs).sort().map(v =>
    '<div class="chip chip-attr ' + (selectedAttrs.includes(v) ? "active" : "") +
    '" data-type="attr" data-val="' + escHtml(v) + '">' + escHtml(v) + "</div>"
  ).join("");

  // 課程分類：分組顯示（積分主題 / 特殊積分）
  document.getElementById("catChips").innerHTML = CAT_GROUPS.map(group =>
    '<div class="cat-group">' +
      '<span class="cat-group-label">' + escHtml(group.label) + '</span>' +
      '<div class="chip-container">' +
        group.cats.map(v =>
          '<div class="chip ' + (selectedCats.includes(v) ? "active" : "") +
          '" data-type="cat" data-val="' + escHtml(v) + '">' + escHtml(v) + "</div>"
        ).join("") +
      '</div>' +
    '</div>'
  ).join("");

  document.querySelectorAll(".chip").forEach(el => {
    el.onclick = () => {
      const type = el.getAttribute("data-type");
      const val  = el.getAttribute("data-val");
      const arr  = type === "cat" ? selectedCats : selectedAttrs;
      const i    = arr.indexOf(val);
      if (i > -1) arr.splice(i,1); else arr.push(val);
      el.classList.toggle("active");
      render();
    };
  });
}

/* ════════════════════════════════════════
   render — 篩選 + 渲染
   ════════════════════════════════════════ */
function render() {
  const key     = document.getElementById("searchInp").value.toLowerCase();
  const showExp = document.getElementById("showExpired").checked;
  const ds = document.getElementById("dateStart").value ? new Date(document.getElementById("dateStart").value).getTime() : null;
  const de = document.getElementById("dateEnd").value   ? new Date(document.getElementById("dateEnd").value).getTime()   : null;

  let list = db.filter(g => {
    if (g._status.includes("隱藏")) return false;
    const past = isExpired(g);
    if (!showExp && past) return false;

    // 關鍵字：任一子課程名稱或開辦單位
    if (key) {
      const inOrg  = (g._org || "").toLowerCase().includes(key);
      const inName = g._courses.some(c => (c.name || "").toLowerCase().includes(key));
      if (!inOrg && !inName) return false;
    }

    // 分類：任一子課程的解析標籤符合
    if (selectedCats.length) {
      const allTags = g._courses.flatMap(c => parseCategoryTags(c.attr));
      if (!selectedCats.some(sc => allTags.includes(sc))) return false;
    }

    // 上課方式
    if (selectedAttrs.length && !selectedAttrs.includes(g._format.trim())) return false;

    // 日期範圍
    const sd = g._date ? new Date(g._date).getTime() : null;
    if (ds && sd !== null && sd < ds) return false;
    if (de && sd !== null && sd > de) return false;

    return true;
  });

  // 排序：置頂 > 未結束 > 日期升冪
  list.sort((a, b) => {
    const ap = a._status.includes("置頂") ? 1 : 0;
    const bp = b._status.includes("置頂") ? 1 : 0;
    if (ap !== bp) return bp - ap;
    const ae = isExpired(a), be = isExpired(b);
    if (ae !== be) return ae ? 1 : -1;
    const da = a._date ? new Date(a._date) : null;
    const db_ = b._date ? new Date(b._date) : null;
    if (!da && !db_) return 0;
    if (!da) return 1; if (!db_) return -1;
    return ae ? db_ - da : da - db_;
  });

  document.getElementById("status-bar").innerHTML =
    '<span class="text-muted me-3">最後更新：' + lastUpdateTime + "</span> 找到 " + list.length + " 門課程";

  /* ── 清單視圖（桌機）── */
  document.getElementById("listView").innerHTML = list.map(g => {
    const isPinned  = g._status.includes("置頂");
    const past      = isExpired(g);
    const typeTag   = buildTypeTag(g._format);
    const dateStr   = g._date || "";
    const timeStr   = g._startTime ? g._startTime + (g._endTime ? "～" + g._endTime : "") : "";
    const price     = priceText(g._fee);
    const metaParts = [];
    if (g._hours) metaParts.push(g._hours + " 時數");
    if (g._pts)   metaParts.push(g._pts + " 積分");
    const metaStr = metaParts.join("　");

    const calTitle = g._courses.map(c => c.name).join("、");
    const calUrl = "https://www.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent(calTitle) +
      "&dates=" + fmtCalDate(g._date, g._startTime) + "/" + fmtCalDate(g._date, g._endTime) +
      "&location=" + encodeURIComponent(g._org || "") +
      "&sf=true&output=xml";
    const applyBtn = (g._applyUrl || "").toLowerCase().startsWith("http")
      ? '<a href="' + escHtml(g._applyUrl) + '" class="btn-apply" target="_blank" rel="noopener"><i class="fa fa-pen-to-square"></i> 立即前往</a>'
      : '<span class="btn-apply-disabled">尚未開放</span>';

    const pinHtml = isPinned ? '<span class="pin-badge me-2"><i class="fa fa-thumbtack"></i> 置頂</span>' : "";

    // 課程列（每個子課程一列）
    const courseRows = g._courses.map(c => {
      const tags = parseCategoryTags(c.attr);
      const catHtml = buildCatTags(tags);
      return '<div class="list-course-row">' +
        '<div class="list-attr-cell">' + catHtml + "</div>" +
        '<div class="list-name-cell">' +
          '<div class="list-title">' + escHtml(c.name) + "</div>" +
        "</div>" +
      "</div>";
    }).join("");

    // Header：日期/時間/時數/積分 各加標籤
    const headerMeta =
      '<div class="gc-meta-row">' +
        (dateStr ? '<span class="gc-meta-item"><span class="gc-meta-label">日期</span>' + escHtml(dateStr) + '</span>' : '') +
        (timeStr ? '<span class="gc-meta-item"><span class="gc-meta-label">時間</span>' + escHtml(timeStr) + '</span>' : '') +
        (g._org  ? '<span class="gc-meta-item"><span class="gc-meta-label">單位</span>' + escHtml(g._org) + '</span>' : '') +
      '</div>' +
      (g._hours || g._pts ?
        '<div class="gc-meta-row">' +
          (g._hours ? '<span class="gc-meta-item"><span class="gc-meta-label">時數</span>' + escHtml(g._hours) + '</span>' : '') +
          (g._pts   ? '<span class="gc-meta-item"><span class="gc-meta-label">積分</span>' + escHtml(g._pts) + '</span>' : '') +
        '</div>' : '');

    return '<div class="list-item ' + (past ? "is-past" : "") + " " + (isPinned ? "is-pinned" : "") + '">' +
      '<div class="list-header">' +
        pinHtml +
        headerMeta +
        typeTag +
      "</div>" +
      courseRows +
      '<div class="list-course-row" style="border-top:1px solid var(--line);padding-top:8px;justify-content:flex-end;align-items:center;flex-wrap:wrap;gap:8px;">' +
        (price ? '<span class="price-text" style="margin-right:auto;">' + escHtml(price) + "</span>" : "") +
        '<div class="item-actions" style="margin-top:0;">' +
          '<a href="' + escHtml(calUrl) + '" class="btn-cal-mini" target="_blank" rel="noopener"><i class="fa fa-calendar-plus"></i> 加到行事曆</a>' +
          applyBtn +
        "</div>" +
      "</div>" +
    "</div>";
  }).join("") || '<div class="text-center py-5 text-muted">沒有符合條件的課程</div>';

  /* ── 卡片視圖（手機）— gc-card 風格 ── */
  document.getElementById("cardView").innerHTML = list.map(g => {
    const isPinned  = g._status.includes("置頂");
    const past      = isExpired(g);
    const typeTag   = buildTypeTag(g._format);
    const dateStr   = g._date || "";
    const timeStr   = g._startTime ? g._startTime + (g._endTime ? "～" + g._endTime : "") : "";
    const price     = priceText(g._fee);
    const metaParts = [];
    if (g._hours) metaParts.push(g._hours + " 時數");
    if (g._pts)   metaParts.push(g._pts + " 積分");
    const metaStr = metaParts.join("　");

    const calTitle = g._courses.map(c => c.name).join("、");
    const calUrl = "https://www.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent(calTitle) +
      "&dates=" + fmtCalDate(g._date, g._startTime) + "/" + fmtCalDate(g._date, g._endTime) +
      "&location=" + encodeURIComponent(g._org || "") +
      "&sf=true&output=xml";
    const applyBtn = (g._applyUrl || "").toLowerCase().startsWith("http")
      ? '<a href="' + escHtml(g._applyUrl) + '" class="btn-apply" target="_blank" rel="noopener"><i class="fa fa-pen-to-square"></i> 立即前往</a>'
      : '<span class="btn-apply-disabled">尚未開放</span>';

    const pinHtml = isPinned ? '<div class="pin-badge mb-2"><i class="fa fa-thumbtack"></i> 置頂推薦</div>' : "";

    // body 列：每個子課程一列（仿 課表.html gc-card-row，顯示縮短標籤）
    const bodyRows = g._courses.map(c => {
      const tags = parseCategoryTags(c.attr);
      const attrInner = tags.length
        ? tags.map(t => "<span>" + escHtml(catDisplayLabel(t)) + "</span>").join("")
        : "<span>—</span>";
      return '<div class="gc-card-row">' +
        '<span class="gc-card-attr">' + attrInner + "</span>" +
        '<span class="gc-card-name">' + escHtml(c.name) + "</span>" +
      "</div>";
    }).join("");

    // Header：日期/時間/時數/積分 各加標籤
    const cardHeader =
      '<div class="gc-card-header">' +
        '<div class="gc-card-header-row1">' +
          '<div style="flex:1;">' +
            '<div class="gc-meta-row">' +
              (dateStr ? '<span class="gc-meta-item"><span class="gc-meta-label">日期</span>' + escHtml(dateStr) + '</span>' : '') +
              (timeStr ? '<span class="gc-meta-item"><span class="gc-meta-label">時間</span>' + escHtml(timeStr) + '</span>' : '') +
            '</div>' +
          '</div>' +
          typeTag +
        '</div>' +
        (g._hours || g._pts ?
          '<div class="gc-meta-row" style="margin-top:4px;">' +
            (g._hours ? '<span class="gc-meta-item" style="color:#e6c96a;"><span class="gc-meta-label">時數</span>' + escHtml(g._hours) + '</span>' : '') +
            (g._pts   ? '<span class="gc-meta-item" style="color:#e6c96a;"><span class="gc-meta-label">積分</span>' + escHtml(g._pts) + '</span>' : '') +
          '</div>' : '') +
        (g._org ? '<div class="gc-card-header-org">' + escHtml(g._org) + "</div>" : "") +
      '</div>';

    return '<div class="col-12">' +
      '<div class="gc-card ' + (past ? "is-past" : "") + " " + (isPinned ? "is-pinned" : "") + '">' +
        pinHtml +
        cardHeader +
        '<div class="gc-card-body">' +
          bodyRows +
        "</div>" +
        '<div class="gc-card-footer">' +
          (price ? '<span class="price-text">' + escHtml(price) + "</span>" : "") +
          '<div class="item-actions">' +
            '<a href="' + escHtml(calUrl) + '" class="btn-cal-mini" target="_blank" rel="noopener"><i class="fa fa-calendar-plus"></i> 加到行事曆</a>' +
            applyBtn +
          "</div>" +
        "</div>" +
      "</div>" +
    "</div>";
  }).join("") || '<div class="col-12 text-center py-5 text-muted">沒有符合條件的課程</div>';

  scheduleNotify();
}

window.onload = init;
</script>
</body>
