<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動課程看板</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --primary:#248dc5;
  --accent:#248dc5;
  --bg:#f5f6f7;
  --text:#2a2a2a;
  --muted:#9fa0a0;
  --line:#dcdddd;
  --gold:#eee800;
  --danger:#ff5757;
  --btn-dark:#2a2a2a;
}

/* 關鍵：html 不要設 height:100%，讓 body 自然長到內容高度 */
html { margin:0; padding:0; }
body{
  margin:0;
  padding:0;
  background:var(--bg);
  font-family:'Microsoft JhengHei','PingFang TC',Arial,sans-serif;
  color:var(--text);
  font-size:15px;
  line-height:1.6;
}

/* 用一個明確的 wrapper 包所有內容，方便量測 */
#measure-wrapper {
  width: 100%;
}

.console-panel{
  background:#fff;border-radius:12px;padding:20px;
  box-shadow:0 4px 16px rgba(36,141,197,.10);
  border:1px solid var(--line);margin-top:16px;
}
.chip-group-label{font-size:.9rem;font-weight:700;color:var(--btn-dark);margin-bottom:8px;display:block;}
.chip-container{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  padding:5px 13px;border-radius:50px;background:#f0f1f1;
  border:1.5px solid var(--line);font-size:.88rem;font-weight:600;
  color:var(--muted);cursor:pointer;transition:.18s;
}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip-attr.active{background:var(--btn-dark);color:#fff;border-color:var(--btn-dark);}

.pin-badge{
  background:var(--gold);color:#2a2a2a;padding:3px 10px;border-radius:999px;
  font-size:.78rem;font-weight:700;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;
}
.tag-badge,.attr-pill{
  color:#fff;padding:5px 11px;border-radius:999px;font-size:.85rem;font-weight:700;
  line-height:1;display:inline-flex;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.tag-badge{border:2px solid rgba(255,255,255,.78);}

.list-item{
  background:#fff;border-radius:8px;padding:14px 18px;
  border:1px solid var(--line);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  transition:.18s;
}
.list-item.is-pinned{border-color:var(--gold);border-width:2px;background:#fffef0;}
.list-item.is-past{opacity:.5;filter:grayscale(.4);}
.list-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(36,141,197,.12);}
.list-main{flex-grow:1;min-width:0;}
.list-title{font-size:1rem;font-weight:700;color:var(--btn-dark);margin:6px 0;line-height:1.5;}
.list-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:.88rem;color:var(--muted);font-weight:500;}
.list-meta i{color:var(--accent);margin-right:3px;}
.list-price{
  min-width:110px;text-align:right;
  font-size:1.25rem;font-weight:700;color:var(--danger);white-space:nowrap;
}

.event-card{
  background:#fff;border-radius:8px;border:1px solid var(--line);
  height:100%;transition:.18s;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.event-card::before{
  content:"";position:absolute;left:0;right:0;top:0;height:4px;
  background:linear-gradient(90deg,var(--primary),#a8acd6);
}
.event-card.is-pinned{border-color:var(--gold);border-width:2px;}
.event-card.is-past{opacity:.5;filter:grayscale(.4);}
.event-card:hover{box-shadow:0 4px 14px rgba(36,141,197,.14);}
.event-title{font-size:1rem;font-weight:700;color:var(--btn-dark);margin-bottom:8px;line-height:1.5;}
.info-text-unified{font-size:.88rem;font-weight:500;line-height:1.7;color:var(--muted);}
.instructor-tag{color:var(--accent);font-size:.95rem;font-weight:600;margin-bottom:6px;}
.time-border{border-left:3px solid var(--accent);padding-left:10px;margin:10px 0;}

.control-bar{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line);
}
.control-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.switch-box{
  background:#f0f1f1;border:1.5px solid var(--line);
  padding:5px 13px;border-radius:50px;
  display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;font-size:.88rem;
}
.btn-clear{
  background-color:var(--accent);color:#fff;border:none;
  font-weight:600;padding:6px 18px;border-radius:50px;cursor:pointer;
  text-decoration:none;display:inline-block;font-size:.88rem;
}
.btn-clear:hover{background-color:var(--btn-dark);color:#fff;}

/* 「加到 Google 行事曆」按鈕（藍底白字） */
.btn-cal-mini{
  background:var(--accent);color:#fff;border:none;
  padding:6px 12px;border-radius:6px;
  font-size:.84rem;font-weight:600;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn-cal-mini:hover{background:var(--btn-dark);color:#fff;}

/* 「立即報名」按鈕（深色填充） */
.btn-apply{
  background:var(--btn-dark);color:#fff;border:none;
  padding:6px 12px;border-radius:6px;
  font-size:.84rem;font-weight:600;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn-apply:hover{background:#000;color:#fff;}

/* 「尚未開放」（灰色禁用狀態） */
.btn-apply-disabled{
  background:#e5e7e7;color:var(--muted);
  padding:6px 12px;border-radius:6px;
  font-size:.84rem;font-weight:600;
  display:inline-flex;align-items:center;cursor:default;white-space:nowrap;
}

/* 清單列右側欄：價格 + 按鈕群（垂直排列） */
.list-right{
  display:flex;flex-direction:column;align-items:flex-end;
  gap:8px;min-width:150px;flex-shrink:0;
}

/* 卡片底部按鈕行 */
.card-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}

/* 上課方式標籤（對應 CSV「上課方式」欄位） */
.tag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.8rem;font-weight:700;white-space:nowrap;}
.tag-real  {background:#fdecea;color:#a52020;}   /* 實體課程 */
.tag-online{background:#e1f5ee;color:#0a5e48;}   /* 線上同步課程 */
.tag-live  {background:#fff4e0;color:#6b4100;}   /* 直播課程 */

/* 布林徽章（同步護理積分 / 住宿機構品質獎勵 / 轉播課程 等欄位值為 TRUE 時顯示） */
.bool-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:4px;
  font-size:.75rem;font-weight:600;background:#e8f4fb;color:#1a6080;
}

/* 時數 / 積分小標 */
.meta-pts{color:var(--accent);font-weight:700;}

#listView{display:block;}
#cardView{display:none;}
@media (max-width:768px){
  #listView{display:none;}
  #cardView{display:flex;flex-wrap:wrap;}
  .control-bar{flex-direction:column;text-align:center;}
  .control-right{justify-content:center;width:100%;}
  /* 手機清單列：右側改為橫排 */
  .list-right{flex-direction:row;align-items:center;flex-wrap:wrap;min-width:unset;}
}
</style>
</head>
<body>

<!-- 用一個明確的容器包所有內容，方便量測 -->
<div id="measure-wrapper">

  <div class="container mb-4 pt-3">
    <div class="console-panel">
      <div class="row g-3">
        <div class="col-lg-4">
          <label class="chip-group-label">關鍵字搜尋</label>
          <input type="text" id="searchInp" class="form-control border-2" placeholder="搜尋主題、講師...">
        </div>
        <div class="col-lg-4 col-6">
          <label class="chip-group-label">日期（自）</label>
          <input type="date" id="dateStart" class="form-control border-2">
        </div>
        <div class="col-lg-4 col-6">
          <label class="chip-group-label">日期（至）</label>
          <input type="date" id="dateEnd" class="form-control border-2">
        </div>
        <div class="col-12 mt-3 mb-2">
          <label class="chip-group-label"><i class="fa fa-filter me-1"></i>上課方式篩選</label>
          <div id="attrChips" class="chip-container"></div>
        </div>
        <div class="col-12">
          <label class="chip-group-label"><i class="fa fa-tags me-1"></i>課程屬性、類別篩選</label>
          <div id="catChips" class="chip-container"></div>
        </div>
      </div>

      <div class="control-bar">
        <div id="status-bar" class="fw-bold text-dark"></div>
        <div class="control-right">
          <label class="switch-box m-0">
            <input class="form-check-input mt-0" type="checkbox" id="showExpired">
            <span>顯示已結束</span>
          </label>
          <a href="#" class="btn-clear" id="btnClear">重置</a>
        </div>
      </div>
    </div>

    <div id="listView" class="mt-4"></div>
    <div id="cardView" class="row g-3 mt-3"></div>
  </div>


</div>
<!-- /measure-wrapper -->

<!-- Modal 已移除：行事曆按鈕與報名按鈕直接嵌入卡片與清單列 -->

<script>
/* ============================================================
   ★★★ 設定區（請修改下方 4 個變數）★★★
   ============================================================ */
const ORG_NAME = "GOGOCARE";
const FOOTER_COPYRIGHT = "© 2026 GOGOCARE All Rights Reserved";
const FOOTER_CONTACT = "聯絡我們：service@example.com";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRDf1yb-PiBzSRzr7w403HG89htbeOLmm7LRoPSViNE-4YX5L6Y96o-w0si5l22hmFntkxQ9B3VUWJA/pub?output=csv";
/* ============================================================ */

let db = [], selectedCats = [], selectedAttrs = [];
let lastUpdateTime = "";
/* Modal 已移除 */

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getColor(text) {
  const colors = ["#1d4ed8","#0891b2","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0f766e"];
  let h = 0;
  const s = String(text||"");
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

function buildTags(raw) {
  if (!raw) return "";
  return raw.split(/[，,]/).map(c => {
    const label = c.trim();
    return '<span class="tag-badge" style="background:' + getColor(label) + ';">' + escHtml(label) + '</span>';
  }).join("");
}

function buildAttrPill(text) {
  if (!text) return "";
  return '<span class="attr-pill" style="background:' + getColor(text) + ';">' + escHtml(text) + '</span>';
}

/* 判斷課程是否已過期：依 _date（清理後的日期）+ _endTime */
function isExpired(d) {
  if (!d._date) return false;
  /* "2026/1/16" → 解析為本地時間 */
  const parts = d._date.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!parts) return false;
  const endTime = d._endTime || "23:59";
  const endDt = new Date(+parts[1], +parts[2]-1, +parts[3],
    +endTime.split(":")[0]||23, +endTime.split(":")[1]||59);
  return new Date() > endDt;
}

/* 格式化售價：純數字 → NT$x,xxx；已有前綴 → 直接顯示；空 → 免費 */
function priceText(v) {
  const raw = String(v == null ? "" : v).trim();
  if (!raw) return "免費";
  const noComma = raw.replace(/,/g,"");
  if (/^0+(\.0+)?$/.test(noComma)) return "免費";
  if (/^\d+(\.\d+)?$/.test(noComma)) return "NT$" + Number(noComma).toLocaleString();
  return raw; /* CSV 已帶 "NT$1,600" 格式，直接輸出 */
}

function fmtCalDate(dateStr, timeStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  let hh = "00", min = "00";
  if (timeStr) {
    const m = timeStr.match(/(\d{1,2})[:：](\d{1,2})/);
    if (m) { hh = m[1].padStart(2,"0"); min = m[2].padStart(2,"0"); }
  }
  return yyyy + mm + dd + "T" + hh + min + "00";
}

/* ====================================================================
   高度通知（防止無限長高的關鍵）
   ==================================================================== */
let lastSentHeight = 0;
let heightNotifyTimer = null;

function getActualContentHeight() {
  // 用 measure-wrapper 的 getBoundingClientRect().bottom 來測量「實際內容底部」
  // 這個值不會因為 iframe 容器變大而變大
  const wrapper = document.getElementById("measure-wrapper");
  if (!wrapper) return 0;
  const rect = wrapper.getBoundingClientRect();
  return Math.ceil(rect.bottom);
}

function notifyHeight() {
  const h = getActualContentHeight();
  // 只在高度有「明顯變化」時通知（差距 > 10px）
  if (Math.abs(h - lastSentHeight) < 10) return;
  if (h < 100) return; // 太小不發
  lastSentHeight = h;
  try {
    window.parent.postMessage({
      type: "EVENT_BOARD_RESIZE",
      height: h
    }, "*");
  } catch(e) {}
}

/* 用節流方式呼叫，避免短時間內重複發送 */
function scheduleNotify() {
  if (heightNotifyTimer) clearTimeout(heightNotifyTimer);
  heightNotifyTimer = setTimeout(notifyHeight, 100);
}

function init() {
  const now = new Date();
  lastUpdateTime = now.getFullYear() + "/" + String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") + " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");

  Papa.parse(CSV_URL, {
    download: true,
    header: false,        /* 不讓 PapaParse 自動抓第一列為 header，因為第一列是說明文字 */
    skipEmptyLines: false,
    complete(res) {
      const rows = res.data;

      /* 找含有「課程名稱」欄位的那一列作為真正的 header（CSV 第二列） */
      const headerIdx = rows.findIndex(row =>
        row.some(cell => String(cell).replace(/\n/g,"").trim() === "課程名稱")
      );
      if (headerIdx < 0) {
        const errHtml = '<div class="text-center py-5 text-muted">找不到 CSV 標題列（需含「課程名稱」欄位）</div>';
        document.getElementById("listView").innerHTML = errHtml;
        document.getElementById("cardView").innerHTML = '<div class="col-12">' + errHtml + '</div>';
        return;
      }

      /* 清理 header 名稱：移除換行符（CSV 中部分欄位名稱有換行） */
      const headers = rows[headerIdx].map(h => String(h).replace(/\n/g,"").trim());

      /* 前向填充：日期/時間/時數/積分/方式/售價 若該列為空，繼承上一筆 */
      let ffDate="", ffTime="", ffHours="", ffCredits="", ffMode="", ffPrice="";

      db = rows.slice(headerIdx + 1).map(row => {
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = row[i] ? String(row[i]).replace(/\n/g, " ").trim() : "";
        });

        /* 前向填充 */
        if (obj["預計日期"])      ffDate    = obj["預計日期"];    else obj["預計日期"]      = ffDate;
        if (obj["預計時間"])      ffTime    = obj["預計時間"];    else obj["預計時間"]      = ffTime;
        if (obj["課程時數(小時)"]) ffHours   = obj["課程時數(小時)"]; else obj["課程時數(小時)"] = ffHours;
        if (obj["預計積分數"])    ffCredits = obj["預計積分數"]; else obj["預計積分數"]    = ffCredits;
        if (obj["上課方式"])      ffMode    = obj["上課方式"];    else obj["上課方式"]      = ffMode;
        if (obj["售價"])          ffPrice   = obj["售價"];        else obj["售價"]          = ffPrice;

        /* 衍生欄位：清理日期（移除星期標注 "2026/1/16 (五)" → "2026/1/16"） */
        obj._date = obj["預計日期"].replace(/\s*[（(][^）)]*[）)]/g, "").trim();

        /* 衍生欄位：拆分時間 "18:00-21:00" → _startTime / _endTime */
        const tp = obj["預計時間"].split(/[-–—~～]/);
        obj._startTime = (tp[0] || "").trim();
        obj._endTime   = (tp[1] || "").trim();

        /* 狀態欄：用「課程狀態」欄位 */
        obj._status = obj["課程狀態"] || "";

        return obj;
      }).filter(r => r["課程名稱"]); /* 只保留有課程名稱的列 */

      setupFilters();
      render();
    },
    error() {
      const errHtml = '<div class="text-center py-5 text-muted"><i class="fa-solid fa-circle-exclamation fa-2x mb-3"></i><br>無法讀取資料，請確認 CSV 網址是否正確且已公開發布。</div>';
      document.getElementById("listView").innerHTML = errHtml;
      document.getElementById("cardView").innerHTML = '<div class="col-12">' + errHtml + '</div>';
      scheduleNotify();
    }
  });

  ["searchInp","dateStart","dateEnd","showExpired"].forEach(id => {
    document.getElementById(id).onchange = render;
    if (id === "searchInp") document.getElementById(id).oninput = render;
  });

  document.getElementById("btnClear").onclick = (e) => {
    e.preventDefault();
    document.getElementById("searchInp").value = "";
    document.getElementById("dateStart").value = "";
    document.getElementById("dateEnd").value = "";
    document.getElementById("showExpired").checked = false;
    selectedCats = []; selectedAttrs = [];
    setupFilters(); render();
  };

  /* 視窗大小變更時重新測量 */
  window.addEventListener("resize", () => {
    render();
    scheduleNotify();
  });

  /* 觀察 measure-wrapper（不是 body）的大小變化 */
  if (window.ResizeObserver) {
    const wrapper = document.getElementById("measure-wrapper");
    if (wrapper) {
      new ResizeObserver(scheduleNotify).observe(wrapper);
    }
  }

  /* 載入完立即通知一次 */
  window.addEventListener("load", scheduleNotify);
}

function setupFilters() {
  const cats = new Set(), attrs = new Set();
  db.forEach(d => {
    /* 課程屬性、類別（以逗號或空白分隔，可多行，清理後加入 Set） */
    if (d["預計課程屬性、類別"]) {
      d["預計課程屬性、類別"].split(/[，,]/).forEach(c => {
        const t = c.trim(); if (t) cats.add(t);
      });
    }
    /* 上課方式（線上同步課程 / 直播課程 / 實體課程…） */
    if (d["上課方式"]) attrs.add(d["上課方式"].trim());
  });

  document.getElementById("catChips").innerHTML = Array.from(cats).sort().map(v =>
    '<div class="chip ' + (selectedCats.includes(v)?"active":"") + '" data-type="cat" data-val="' + escHtml(v) + '">' + escHtml(v) + '</div>'
  ).join("");

  document.getElementById("attrChips").innerHTML = Array.from(attrs).sort().map(v =>
    '<div class="chip chip-attr ' + (selectedAttrs.includes(v)?"active":"") + '" data-type="attr" data-val="' + escHtml(v) + '">' + escHtml(v) + '</div>'
  ).join("");

  document.querySelectorAll(".chip").forEach(el => {
    el.onclick = () => {
      const type = el.getAttribute("data-type");
      const val = el.getAttribute("data-val");
      const arr = (type === "cat") ? selectedCats : selectedAttrs;
      const i = arr.indexOf(val);
      if (i > -1) arr.splice(i,1); else arr.push(val);
      el.classList.toggle("active");
      render();
    };
  });
}

function render() {
  const key = document.getElementById("searchInp").value.toLowerCase();
  const showExp = document.getElementById("showExpired").checked;
  const ds = document.getElementById("dateStart").value ? new Date(document.getElementById("dateStart").value).getTime() : null;
  const de = document.getElementById("dateEnd").value ? new Date(document.getElementById("dateEnd").value).getTime() : null;

  let list = db.filter(d => {
    const past = isExpired(d);
    if (!showExp && past) return false;
    /* 關鍵字：搜尋課程名稱 + 開課單位 + 課程屬性類別 */
    const matchK = (d["課程名稱"]||"").toLowerCase().includes(key)
                || (d["開課單位"]||"").toLowerCase().includes(key)
                || (d["預計課程屬性、類別"]||"").toLowerCase().includes(key);
    if (!matchK) return false;
    /* 課程屬性、類別篩選（逗號分隔，任一符合即可） */
    const dCats = d["預計課程屬性、類別"] ? d["預計課程屬性、類別"].split(/[，,]/).map(x => x.trim()) : [];
    if (selectedCats.length && !dCats.some(c => selectedCats.includes(c))) return false;
    /* 上課方式篩選 */
    if (selectedAttrs.length && !selectedAttrs.includes(d["上課方式"])) return false;
    /* 日期範圍篩選 */
    const dateParts = d._date.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    const sd = dateParts ? new Date(+dateParts[1], +dateParts[2]-1, +dateParts[3]).getTime() : null;
    if (sd) {
      if (ds && sd < ds) return false;
      if (de && sd > de) return false;
    }
    return true;
  });

  list.sort((a,b) => {
    const ae = isExpired(a), be = isExpired(b);
    if (ae !== be) return ae - be; /* 未過期在前 */
    /* 同狀態依日期升序排列 */
    const parse = d => {
      const m = d._date.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      return m ? new Date(+m[1], +m[2]-1, +m[3]).getTime() : 0;
    };
    return ae ? parse(b) - parse(a) : parse(a) - parse(b);
  });

  document.getElementById("status-bar").innerHTML =
    '<span class="text-muted me-3">最後更新：' + lastUpdateTime + '</span> 找到 ' + list.length + ' 個活動';

  /* 將「上課方式」轉為對應的 tag class */
  function modeTag(mode) {
    const m = mode || "";
    const cls = m.includes("實體") ? "tag-real" : m.includes("直播") ? "tag-live" : "tag-online";
    return '<span class="tag ' + cls + '">' + escHtml(m) + '</span>';
  }

  /* 布林徽章：TRUE 才顯示，FALSE / 空 不顯示 */
  function boolBadge(val, label) {
    return String(val).trim().toUpperCase() === "TRUE"
      ? '<span class="bool-badge"><i class="fa fa-check me-1"></i>' + escHtml(label) + '</span>' : "";
  }

  /* ── 桌機清單視圖（listView）──
     左：[上課方式 tag][分類 tags] / 課程名稱 / 開課單位・日期・時間・時數・積分・布林徽章
     右：售價 / 加到行事曆 按鈕 */
  document.getElementById("listView").innerHTML = list.map(d => {
    const past = isExpired(d);
    const price = priceText(d["售價"]);
    const catTags = buildTags(d["預計課程屬性、類別"]);
    const timeStr = d._startTime + (d._endTime ? " ~ " + d._endTime : "");
    const calStart = fmtCalDate(d._date, d._startTime);
    const calEnd   = fmtCalDate(d._date, d._endTime);
    const calUrl   = "https://www.google.com/calendar/render?action=TEMPLATE"
      + "&text=" + encodeURIComponent(d["課程名稱"]||"")
      + "&dates=" + calStart + "/" + calEnd
      + "&details=" + encodeURIComponent("積分：" + (d["預計積分數"]||"") + "｜時數：" + (d["課程時數(小時)"]||""))
      + "&location=" + encodeURIComponent(d["上課方式"]||"")
      + "&sf=true&output=xml";

    return '<div class="list-item ' + (past?"is-past":"") + '">' +
      '<div class="list-main">' +
        /* 第一行：上課方式 tag + 課程屬性分類 tags */
        '<div class="d-flex flex-wrap gap-2 align-items-center mb-1">' +
          modeTag(d["上課方式"]) + catTags +
        '</div>' +
        /* 課程名稱（主標題） */
        '<div class="list-title">' + escHtml(d["課程名稱"]||"") + '</div>' +
        /* 輔助資訊：開課單位 / 日期 / 時間 / 時數+積分 */
        '<div class="list-meta">' +
          (d["開課單位"] ? '<div><i class="fa fa-building me-1"></i>' + escHtml(d["開課單位"]) + '</div>' : '') +
          '<div><i class="fa-regular fa-calendar me-1"></i>' + escHtml(d._date||"—") + '</div>' +
          '<div><i class="fa-regular fa-clock me-1"></i>' + escHtml(timeStr||"—") + '</div>' +
          (d["課程時數(小時)"] ? '<div><i class="fa fa-hourglass-half me-1"></i>' + escHtml(d["課程時數(小時)"]) + ' 時 <span class="meta-pts">/ ' + escHtml(d["預計積分數"]||"") + ' 積分</span></div>' : '') +
        '</div>' +
        /* 布林徽章列（TRUE 才顯示） */
        '<div class="d-flex flex-wrap gap-1 mt-1">' +
          boolBadge(d["同步護理積分"],       "同步護理積分") +
          boolBadge(d["住宿機構品質獎勵"],   "住宿品質獎勵") +
          boolBadge(d["轉播課程"],           "轉播課程") +
          boolBadge(d["GOOGLE MEET內建同步翻譯(越南字幕、印尼字幕)"], "MEET翻譯") +
        '</div>' +
      '</div>' +
      /* 右側欄：售價 + 加到行事曆 */
      '<div class="list-right">' +
        '<div class="list-price">' + escHtml(price) + '</div>' +
        '<a href="' + escHtml(calUrl) + '" class="btn-cal-mini" target="_blank" rel="noopener">' +
          '<i class="fa fa-calendar-plus me-1"></i>加到行事曆</a>' +
      '</div>' +
    '</div>';
  }).join("") || '<div class="text-center py-5 text-muted">沒有符合條件的課程</div>';

  /* ── 手機卡片視圖（cardView）── */
  document.getElementById("cardView").innerHTML = list.map(d => {
    const past = isExpired(d);
    const price = priceText(d["售價"]);
    const catTags = buildTags(d["預計課程屬性、類別"]);
    const timeStr = d._startTime + (d._endTime ? " ~ " + d._endTime : "");
    const calStart = fmtCalDate(d._date, d._startTime);
    const calEnd   = fmtCalDate(d._date, d._endTime);
    const calUrl   = "https://www.google.com/calendar/render?action=TEMPLATE"
      + "&text=" + encodeURIComponent(d["課程名稱"]||"")
      + "&dates=" + calStart + "/" + calEnd
      + "&details=" + encodeURIComponent("積分：" + (d["預計積分數"]||"") + "｜時數：" + (d["課程時數(小時)"]||""))
      + "&location=" + encodeURIComponent(d["上課方式"]||"")
      + "&sf=true&output=xml";

    return '<div class="col-12">' +
      '<div class="event-card p-4 ' + (past?"is-past":"") + '">' +
        /* 上課方式 tag + 課程屬性分類 */
        '<div class="mb-2 d-flex flex-wrap gap-2">' + modeTag(d["上課方式"]) + catTags + '</div>' +
        /* 課程名稱 */
        '<div class="event-title">' + escHtml(d["課程名稱"]||"") + '</div>' +
        /* 開課單位 */
        (d["開課單位"] ? '<div class="instructor-tag"><i class="fa fa-building me-2"></i>' + escHtml(d["開課單位"]) + '</div>' : '') +
        /* 日期時間區塊（左側豎線） */
        '<div class="time-border">' +
          '<div class="info-text-unified"><i class="fa fa-calendar-alt me-2 text-muted"></i>' + escHtml(d._date||"—") + '</div>' +
          '<div class="info-text-unified" style="opacity:.86"><i class="fa fa-clock me-2 text-muted"></i>' + escHtml(timeStr||"—") + '</div>' +
          (d["課程時數(小時)"] ?
            '<div class="info-text-unified" style="opacity:.86"><i class="fa fa-hourglass-half me-2 text-muted"></i>' +
            escHtml(d["課程時數(小時)"]) + ' 時 / <span class="meta-pts">' + escHtml(d["預計積分數"]||"") + ' 積分</span></div>' : '') +
        '</div>' +
        /* 布林徽章 */
        '<div class="d-flex flex-wrap gap-1 mb-2">' +
          boolBadge(d["同步護理積分"],       "同步護理積分") +
          boolBadge(d["住宿機構品質獎勵"],   "住宿品質獎勵") +
          boolBadge(d["轉播課程"],           "轉播課程") +
          boolBadge(d["GOOGLE MEET內建同步翻譯(越南字幕、印尼字幕)"], "MEET翻譯") +
        '</div>' +
        /* 底部：售價 + 行事曆按鈕 */
        '<div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">' +
          '<span style="font-size:1.2rem;font-weight:700;color:var(--danger);">' + escHtml(price) + '</span>' +
          '<a href="' + escHtml(calUrl) + '" class="btn-cal-mini" target="_blank" rel="noopener">' +
            '<i class="fa fa-calendar-plus me-1"></i>加到行事曆</a>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join("") || '<div class="col-12 text-center py-5 text-muted">沒有符合條件的課程</div>';

  scheduleNotify(); /* 渲染後通知高度（iframe 用） */
}
/* showDetail() 已移除：按鈕直接嵌入卡片與清單列 */

window.onload = init;
</script>
</body>
</html>
