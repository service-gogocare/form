<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網路課程看板</title>
<meta name="description" content="網路課程清單，依截止日排序，支援積分主題篩選，即時顯示送審倒數天數。">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
/* ── 全域變數 ── */
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --bg: #f1f5f9;
  --card-bg: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --line: #e2e8f0;
  --badge-urgent-bg: #fef2f2;
  --badge-urgent-text: #dc2626;
  --badge-warn-bg: #fff7ed;
  --badge-warn-text: #ea580c;
  --badge-ok-bg: #f0fdf4;
  --badge-ok-text: #16a34a;
  --badge-expired-bg: #f8fafc;
  --badge-expired-text: #94a3b8;
  --tag-theme-bg: #eff6ff;
  --tag-theme-text: #1d4ed8;
  --tag-special-bg: #faf5ff;
  --tag-special-text: #7c3aed;
  --thumb-placeholder: #dde1e7;
}

html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

/* ── 容器 ── */
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px 40px; }

/* ── 頁首 ── */
.page-header {
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 16px;
  margin: 0 -16px 16px;
  padding: 0 16px;
  min-height: 124px;
  background-color: #F1F5F9;
  border-bottom: none;
}
.page-header-text {
  flex: 1; min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.page-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 24px; font-weight: 800; margin: 0;
  color: #248DC5;
  line-height: 1.2;
}
.page-title .fa-laptop-medical {
  color: #248DC5 !important;
  font-size: 24px;
  line-height: 1;
}
.page-subtitle { font-size: .85rem; color: #248DC5; margin-top: 2px; }
.page-header-logo {
  flex-shrink: 0;
  align-self: center;
  height: 99px;
  width: auto;
  max-width: none;
  max-height: 99px;
  object-fit: contain;
}

/* 視覺隱藏（保留給 JS / 螢幕閱讀器使用） */
.is-visually-hidden {
  position: absolute !important;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ── 篩選提示 ── */
.filter-hint {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fffb80;
  border: 1px solid #bfdbfe;
  color: var(--primary-dark);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.5;
}
.filter-hint i { font-size: 1rem; color: #004275; }
.filter-hint span { color: #004275; }

/* ── 篩選面板 ── */
.filter-panel {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.filter-toggle-btn {
  display: none;
  width: 100%; padding: 0; background: none; border: none;
  text-align: left; font-weight: 700; font-size: .95rem; color: var(--text);
  cursor: pointer; align-items: center; gap: 8px;
}
.filter-active-badge {
  background: var(--primary); color: #fff;
  padding: 1px 8px; border-radius: 20px; font-size: .75rem; font-weight: 700;
}
.filter-chevron { transition: transform .2s; font-size: .78rem; margin-left: auto; }
.filter-chevron.is-open { transform: rotate(180deg); }
.filter-body { display: block; }
.filter-group { margin-bottom: 12px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group-label {
  font-size: .72rem; font-weight: 700; color: var(--muted);
  display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 5px 14px; border-radius: 50px;
  background: #f1f5f9; border: 1.5px solid var(--line);
  font-size: .85rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: .15s; user-select: none;
}
.chip:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
.chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.chip.chip-special.active { background: #7c3aed; border-color: #7c3aed; }
.chip.chip-empty { opacity: .42; }
.chip.chip-empty:hover { opacity: 1; }
.chip.chip-month.active { background: #0f766e; border-color: #0f766e; }
.chip-count { font-size: .72em; opacity: .7; }

@media (max-width: 767px) {
  .filter-toggle-btn { display: flex; }
  .filter-body {
    display: none; padding-top: 14px;
    border-top: 1px solid var(--line); margin-top: 10px;
  }
  .filter-body.is-open { display: block; }
}

/* ── 狀態列 ── */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .82rem; color: var(--muted); margin-bottom: 14px;
  flex-wrap: wrap; gap: 4px;
}
.status-count { font-weight: 700; color: var(--text); }

/* ── 標籤 ── */
.tag-theme {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--tag-theme-bg); color: var(--tag-theme-text);
  border: 1px solid #bfdbfe; white-space: nowrap;
}
.tag-special {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--tag-special-bg); color: var(--tag-special-text);
  border: 1px solid #ddd6fe; white-space: nowrap;
}

/* ── 倒數徽章 ── */
.countdown-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.countdown-urgent { background: var(--badge-urgent-bg); color: var(--badge-urgent-text); }
.countdown-warn   { background: var(--badge-warn-bg);   color: var(--badge-warn-text); }
.countdown-ok     { background: var(--badge-ok-bg);     color: var(--badge-ok-text); }
.countdown-expired { background: var(--badge-expired-bg); color: var(--badge-expired-text); }

/* ══════════════════════════════════════════
   手機 清單視圖（預設：mobile-first）
   ══════════════════════════════════════════ */
.list-view { display: flex; flex-direction: column; gap: 10px; }
.list-item {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex; gap: 12px;
  padding: 12px;
  text-decoration: none; color: inherit;
  transition: box-shadow .15s, border-color .15s;
  cursor: pointer;
}
.list-item:hover { box-shadow: 0 4px 16px rgba(37,99,235,.10); border-color: #93c5fd; }
.list-item.is-expired { opacity: .55; }

.list-thumb {
  flex-shrink: 0;
  width: 110px; height: 82px;
  border-radius: 8px; overflow: hidden;
  background: var(--thumb-placeholder);
}
.list-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.list-thumb .thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  color: rgba(255,255,255,.5); font-size: 1.4rem;
}

.list-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.list-title {
  font-size: .92rem; font-weight: 700; line-height: 1.4;
  color: var(--text); display: -webkit-box;
  -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.list-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.list-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: .8rem; color: var(--muted); }
.list-meta .sep { color: var(--line); }
.list-meta .pts { font-weight: 700; color: var(--text); }

/* ══════════════════════════════════════════
   桌機 卡片 Grid（≥ 768px）
   ══════════════════════════════════════════ */
.card-grid { display: none; }

@media (min-width: 768px) {
  .list-view { display: none; }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
}

@media (min-width: 1100px) {
  .card-grid { grid-template-columns: repeat(4, 1fr); }
}

.course-card {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: box-shadow .18s, transform .18s, border-color .18s;
  text-decoration: none; color: inherit;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.course-card:hover {
  box-shadow: 0 6px 24px rgba(37,99,235,.12);
  transform: translateY(-3px);
  border-color: #93c5fd;
}
.course-card.is-expired { opacity: .6; }

/* 縮圖區 */
.card-thumb {
  width: 100%; aspect-ratio: 16 / 9; overflow: hidden;
  background: var(--thumb-placeholder);
  position: relative; flex-shrink: 0;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
/* 占位圖：漸層 + 圖示 */
.card-thumb .thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  color: rgba(255,255,255,.45); font-size: 1.8rem;
}

/* 卡片 Header（深色，仿 gc-card-header） */
.card-header {
  background: #1e293b;
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  flex-shrink: 0;
}
.card-header-deadline {
  font-size: .78rem; color: rgba(255,255,255,.65);
  display: flex; align-items: center; gap: 4px;
}
.card-header-deadline strong { color: #fff; font-weight: 700; }

/* 卡片主體 */
.card-body {
  padding: 12px 14px; flex: 1;
  display: flex; flex-direction: column; gap: 7px;
}
.card-title {
  font-size: .9rem; font-weight: 700; line-height: 1.45;
  color: var(--text); display: -webkit-box;
  -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.card-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-size: .78rem; color: var(--muted); margin-top: auto;
}
.card-meta .pts { font-weight: 700; color: var(--text); }

/* 卡片底部 */
.card-footer {
  padding: 10px 14px; border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
}
.btn-goto {
  background: var(--primary); color: #fff;
  border: none; border-radius: 8px;
  padding: 6px 14px; font-size: .82rem; font-weight: 600;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  transition: background .15s;
  white-space: nowrap;
}
.btn-goto:hover { background: var(--primary-dark); color: #fff; }
.btn-goto-disabled {
  background: #f1f5f9; color: var(--muted);
  border-radius: 8px; padding: 6px 14px;
  font-size: .82rem; font-weight: 600; white-space: nowrap;
}

/* ── 截止日文字 ── */
.deadline-text { font-size: .78rem; color: var(--muted); }
.deadline-text strong { color: var(--text); font-weight: 700; }

/* ── 空狀態 ── */
.empty-state {
  text-align: center; padding: 48px 16px; color: var(--muted);
  grid-column: 1 / -1;
}
.empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; opacity: .35; }

/* ── 載入中 ── */
.loading-state {
  text-align: center; padding: 48px 16px; color: var(--muted);
  grid-column: 1 / -1;
}

/* ── 已截止標籤 ── */
.expired-label {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,.55); color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}
</style>

<body>
<div class="page-wrap">

  <!-- 頁首 -->
  <div class="page-header">
    <div class="page-header-text">
      <h1 class="page-title"><i class="fa-solid fa-laptop-medical"></i><span>網路課程看板</span></h1>
      <p class="page-subtitle is-visually-hidden" id="update-time">資料載入中…</p>
    </div>
    <img
      class="page-header-logo"
      src="https://www.gogocare.com.tw/UserFiles/uploads/images/20260522165334_3906.jpg"
      alt="GoGoCare"
      loading="lazy"
    >
  </div>

  <!-- 篩選提示 -->
  <div class="filter-hint">
    <i class="fa-solid fa-circle-info"></i>
    <span>網路課程類別、截止日期快速篩選，幫你馬上找到最合適課程！</span>
  </div>

  <!-- 篩選面板 -->
  <div class="filter-panel">
    <!-- 手機折疊按鈕 -->
    <button class="filter-toggle-btn" id="filterToggleBtn" type="button">
      <i class="fa-solid fa-sliders me-1"></i> 篩選條件
      <span class="filter-active-badge" id="filterActiveBadge" style="display:none;"></span>
      <i class="fa-solid fa-chevron-down filter-chevron" id="filterChevron"></i>
    </button>

    <div class="filter-body" id="filterBody">
      <!-- 積分主題（標籤由 JS 依 CAT_GROUPS 動態產生） -->
      <div class="filter-group" id="themeGroup" style="display:none;">
        <span class="filter-group-label">積分主題</span>
        <div class="chip-row" id="themeChips"></div>
      </div>

      <!-- 特找積分（標籤由 JS 依 CAT_GROUPS 動態產生） -->
      <div class="filter-group" id="specialGroup" style="display:none;">
        <span class="filter-group-label">特找積分</span>
        <div class="chip-row" id="specialChips"></div>
      </div>

      <!-- 截止月份（由 JS 動態產生） -->
      <div class="filter-group" id="monthGroup">
        <span class="filter-group-label">截止月份</span>
        <div class="chip-row" id="monthChips"></div>
      </div>
    </div>
  </div>

  <!-- 狀態列 -->
  <div class="status-bar">
    <span id="statusBar">載入中…</span>
    <span>
      <button class="chip" id="clearBtn" style="font-size:.78rem;padding:3px 12px;" type="button">
        <i class="fa-solid fa-rotate-left me-1"></i>清除篩選
      </button>
    </span>
  </div>

  <!-- 手機清單視圖 -->
  <div class="list-view" id="listView">
    <div style="text-align:center;padding:40px;color:var(--muted);">
      <i class="fa-solid fa-spinner fa-spin me-2"></i>資料載入中…
    </div>

  <!-- 桌機卡片 Grid -->
  <div class="card-grid" id="cardGrid">

      <i class="fa-solid fa-spinner fa-spin me-2"></i>資料載入中…

</div><!-- /page-wrap -->

<script>
/* ════════════════════════════════════════
   設定區 — 請填入 Google Sheet 公開 CSV 網址
   取得方式：Google Sheet → 檔案 → 共用 → 發布到網路
            → 選「網路課程課表」工作表 → 格式選 CSV → 發布 → 複製網址
   ════════════════════════════════════════ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrhEmVBEEIZu172SGx2ZdQjxzP9IMXAlGGdPLCY2_-NjXFoHKX5d28pI6b8zZ6xzXslwDtokoPxuX2/pub?gid=1081455974&single=true&output=csv";

/* ════════════════════════════════════════
   狀態變數
   ════════════════════════════════════════ */
let db = [];
let selectedThemes  = [];
let selectedSpecial = [];
let selectedMonths  = [];

/* ════════════════════════════════════════
   工具函式
   ════════════════════════════════════════ */
function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* 解析多值欄位（支援逗號、頓號、斜線分隔） */
function parseMulti(raw) {
  if (!raw) return [];
  return String(raw).split(/[,，、\/／]/).map(s => s.trim()).filter(Boolean);
}

/* 計算距截止日的天數（今天 = 0，截止日含當天） */
function daysLeft(dateStr) {
  if (!dateStr) return null;
  const d = new Date(String(dateStr).trim());
  if (isNaN(d)) return null;
  d.setHours(23, 59, 59, 0);
  const diff = d - new Date();
  return Math.ceil(diff / 86400000);
}

/* 建立倒數徽章 HTML */
function buildCountdownBadge(days) {
  if (days === null) return "";
  if (days < 0) return '<span class="countdown-badge countdown-expired"><i class="fa-regular fa-clock"></i> 已截止</span>';
  if (days === 0) return '<span class="countdown-badge countdown-urgent"><i class="fa-solid fa-fire"></i> 今天截止</span>';
  if (days <= 3)  return '<span class="countdown-badge countdown-urgent"><i class="fa-solid fa-fire"></i> 剩 ' + days + ' 天</span>';
  if (days <= 7)  return '<span class="countdown-badge countdown-warn"><i class="fa-regular fa-clock"></i> 剩 ' + days + ' 天</span>';
  return '<span class="countdown-badge countdown-ok"><i class="fa-regular fa-clock"></i> 剩 ' + days + ' 天</span>';
}

/* 建立積分主題標籤 */
function buildThemeTags(themes) {
  return themes.map(t =>
    '<span class="tag-theme">' + escHtml(t) + '</span>'
  ).join("");
}

/* 建立特殊積分標籤 */
function buildSpecialTags(specials) {
  return specials.map(s =>
    '<span class="tag-special">' + escHtml(s) + '</span>'
  ).join("");
}

/* 縮圖 onerror 處理（獨立函式避免 HTML 屬性引號衝突） */
function onThumbError(img) {
  img.parentNode.innerHTML = '<div class="thumb-placeholder"><i class="fa-solid fa-book-open"></i></div>';
}

/* 縮圖 HTML（有圖用圖，無圖用占位） */
function buildThumb(url, title) {
  if (url && url.toLowerCase().startsWith("http")) {
    return '<img src="' + escHtml(url) + '" alt="' + escHtml(title) + '" loading="lazy" onerror="onThumbError(this)">';
  }
  return '<div class="thumb-placeholder"><i class="fa-solid fa-book-open"></i></div>';
}

/* 截止日格式化顯示 */
function fmtDeadline(dateStr) {
  if (!dateStr) return "";
  const d = new Date(String(dateStr).trim());
  if (isNaN(d)) return dateStr;
  return d.getFullYear() + "/" +
    String(d.getMonth()+1).padStart(2,"0") + "/" +
    String(d.getDate()).padStart(2,"0");
}

/* ════════════════════════════════════════
   篩選邏輯
   ════════════════════════════════════════ */
function filterData() {
  return db.filter(row => {
    /* 截止月份篩選（多選 OR，key 格式：YYYY-M） */
    if (selectedMonths.length) {
      const d = row["課程截止日"];
      if (!d) return false;
      const date = new Date(String(d).trim());
      if (isNaN(date)) return false;
      const key = date.getFullYear() + "-" + (date.getMonth() + 1);
      if (!selectedMonths.includes(key)) return false;
    }

    /* 積分主題篩選（多選 OR） */
    if (selectedThemes.length) {
      const rowThemes = parseMulti(row["積分主題"]);
      if (!selectedThemes.some(t => rowThemes.includes(t))) return false;
    }

    /* 特找積分篩選（多選 OR） */
    if (selectedSpecial.length) {
      const rowSpecial = parseMulti(row["特殊積分"]);
      if (!selectedSpecial.some(s => rowSpecial.includes(s))) return false;
    }

    return true;
  });
}

/* ════════════════════════════════════════
   渲染
   ════════════════════════════════════════ */
function render() {
  let list = filterData();

  /* 排序：剩餘天數小的優先；已截止排最後 */
  list.sort((a, b) => {
    const da = daysLeft(a["課程截止日"]);
    const db_ = daysLeft(b["課程截止日"]);
    if (da === null && db_ === null) return 0;
    if (da === null) return 1;
    if (db_ === null) return -1;
    /* 已截止排後面 */
    if (da < 0 && db_ >= 0) return 1;
    if (da >= 0 && db_ < 0) return -1;
    return da - db_;
  });

  document.getElementById("statusBar").innerHTML =
    '共 <span class="status-count">' + list.length + '</span> 門課程';

  renderList(list);
  renderCards(list);
  updateFilterBadge();
}

/* ── 手機清單 ── */
function renderList(list) {
  if (!list.length) {
    document.getElementById("listView").innerHTML =
      '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>沒有符合條件的課程</div>';
    return;
  }

  document.getElementById("listView").innerHTML = list.map(row => {
    const name     = row["課程名稱"] || "";
    const link     = row["連結"] || "";
    const pts      = row["課程積分"] || "";
    const deadline = row["課程截止日"] || "";
    const thumbUrl = row["縮圖URL"] || "";
    const themes   = parseMulti(row["積分主題"]);
    const specials = parseMulti(row["特殊積分"]);
    const days     = daysLeft(deadline);
    const expired  = days !== null && days < 0;

    const tagHtml  = buildThemeTags(themes) + buildSpecialTags(specials);
    const badgeHtml = buildCountdownBadge(days);
    const deadlineHtml = deadline
      ? '<span class="deadline-text">截止 <strong>' + fmtDeadline(deadline) + '</strong></span>'
      : "";

    const href = link.toLowerCase().startsWith("http") ? escHtml(link) : "#";
    const target = link.toLowerCase().startsWith("http") ? ' target="_blank" rel="noopener"' : "";

    return '<a href="' + href + '"' + target + ' class="list-item' + (expired ? " is-expired" : "") + '">' +
      '<div class="list-thumb">' + buildThumb(thumbUrl, name) + '</div>' +
      '<div class="list-info">' +
        '<div class="list-title">' + escHtml(name) + '</div>' +
        (tagHtml ? '<div class="list-tags">' + tagHtml + '</div>' : '') +
        '<div class="list-meta">' +
          (pts ? '<span class="pts"><i class="fa-solid fa-star" style="color:#f59e0b;font-size:.72rem;"></i> ' + escHtml(pts) + ' 積分</span>' : '') +
          (pts && deadline ? '<span class="sep">·</span>' : '') +
          deadlineHtml +
        '</div>' +
        (badgeHtml ? '<div>' + badgeHtml + '</div>' : '') +
      '</div>' +
    '</a>';
  }).join("");
}

/* ── 桌機卡片 Grid ── */
function renderCards(list) {
  if (!list.length) {
    document.getElementById("cardGrid").innerHTML =
      '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>沒有符合條件的課程</div>';
    return;
  }

  document.getElementById("cardGrid").innerHTML = list.map(row => {
    const name     = row["課程名稱"] || "";
    const link     = row["連結"] || "";
    const pts      = row["課程積分"] || "";
    const deadline = row["課程截止日"] || "";
    const thumbUrl = row["縮圖URL"] || "";
    const themes   = parseMulti(row["積分主題"]);
    const specials = parseMulti(row["特殊積分"]);
    const days     = daysLeft(deadline);
    const expired  = days !== null && days < 0;

    const tagHtml  = buildThemeTags(themes) + buildSpecialTags(specials);
    const badgeHtml = buildCountdownBadge(days);
    const deadlineHtml = deadline
      ? '<span class="deadline-text">截止 <strong>' + fmtDeadline(deadline) + '</strong></span>'
      : "";

    const href = link.toLowerCase().startsWith("http") ? escHtml(link) : "#";
    const target = link.toLowerCase().startsWith("http") ? ' target="_blank" rel="noopener"' : "";
    const gotoBtn = link.toLowerCase().startsWith("http")
      ? '<a href="' + href + '"' + target + ' class="btn-goto"><i class="fa-solid fa-arrow-up-right-from-square"></i> 前往課程</a>'
      : '<span class="btn-goto-disabled">連結未設定</span>';

    return '<div class="course-card' + (expired ? " is-expired" : "") + '">' +
      '<div class="card-thumb">' +
        buildThumb(thumbUrl, name) +
        (expired ? '<span class="expired-label">已截止</span>' : '') +
      '</div>' +
      '<div class="card-header">' +
        '<span class="card-header-deadline">' +
          '<i class="fa-regular fa-calendar"></i>' +
          (deadline ? '截止 <strong>' + fmtDeadline(deadline) + '</strong>' : '<span style="opacity:.5">無截止日</span>') +
        '</span>' +
        (badgeHtml ? badgeHtml : '') +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + escHtml(name) + '</div>' +
        (tagHtml ? '<div class="card-tags">' + tagHtml + '</div>' : '') +
        '<div class="card-meta">' +
          (pts ? '<span class="pts"><i class="fa-solid fa-star" style="color:#f59e0b;font-size:.72rem;"></i> ' + escHtml(pts) + ' 積分</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        gotoBtn +
      '</div>' +
    '</div>';
  }).join("");
}

/* ════════════════════════════════════════
   固定分類群組定義（與爬蟲分類保持一致）
   ════════════════════════════════════════ */
const CAT_GROUPS = [
  {
    id: "themeGroup", chipsId: "themeChips", type: "theme",
    label: "積分主題",
    cats: ["專業課程", "專業品質", "專業倫理", "專業法規", "非積分課程", "積分申請中"]
  },
  {
    id: "specialGroup", chipsId: "specialChips", type: "special",
    label: "特找積分",
    cats: ["感染管制", "緊急應變", "消防安全", "性別敏感度",
           "原住民族文化敏感度及能力", "多元族群文化敏感度及能力", "其他"]
  }
];

/* ════════════════════════════════════════
   篩選 chip 初始化（固定分組，依資料有無加 dim 樣式）
   ════════════════════════════════════════ */
function setupFilters() {
  /* 統計資料中實際出現的值 */
  const inDataTheme   = new Set();
  const inDataSpecial = new Set();
  db.forEach(row => {
    parseMulti(row["積分主題"]).forEach(t => inDataTheme.add(t));
    parseMulti(row["特殊積分"]).forEach(s => inDataSpecial.add(s));
  });

  CAT_GROUPS.forEach(group => {
    const inData = group.type === "theme" ? inDataTheme : inDataSpecial;
    document.getElementById(group.id).style.display = "";
    document.getElementById(group.chipsId).innerHTML = group.cats.map(cat => {
      const hasData = inData.has(cat);
      return '<div class="chip' +
        (group.type === "special" ? " chip-special" : "") +
        (hasData ? "" : " chip-empty") +
        '" data-type="' + group.type + '" data-val="' + escHtml(cat) + '" title="' +
        escHtml(cat) + (hasData ? "" : "（目前無資料）") + '">' +
        escHtml(cat) + '</div>';
    }).join("");
  });

  /* 截止月份 chips（動態從資料萃取，key 格式：YYYY-M） */
  const monthCount = new Map();
  db.forEach(row => {
    const d = row["課程截止日"];
    if (!d) return;
    const date = new Date(String(d).trim());
    if (!isNaN(date)) {
      const key = date.getFullYear() + "-" + (date.getMonth() + 1);
      monthCount.set(key, (monthCount.get(key) || 0) + 1);
    }
  });
  document.getElementById("monthChips").innerHTML =
    Array.from(monthCount.keys())
      .sort((a, b) => {
        const [ay, am] = a.split("-").map(Number);
        const [by, bm] = b.split("-").map(Number);
        return ay !== by ? ay - by : am - bm;
      })
      .map(key => {
        const [y, m] = key.split("-");
        return '<div class="chip chip-month" data-type="month" data-val="' + key + '">' +
          y + '/' + m + '月 <span class="chip-count">(' + monthCount.get(key) + ')</span></div>';
      }).join("");

  /* 所有 chip 事件 */
  document.querySelectorAll(".chip[data-type]").forEach(el => {
    el.addEventListener("click", () => {
      const type = el.getAttribute("data-type");
      const val  = el.getAttribute("data-val");

      if (type === "month") {
        toggleArr(selectedMonths, val);
        el.classList.toggle("active");

      } else if (type === "theme") {
        toggleArr(selectedThemes, val);
        el.classList.toggle("active");

      } else if (type === "special") {
        toggleArr(selectedSpecial, val);
        el.classList.toggle("active");
      }

      render();
    });
  });

  /* 清除按鈕 */
  document.getElementById("clearBtn").addEventListener("click", () => {
    selectedThemes  = [];
    selectedSpecial = [];
    selectedMonths  = [];
    document.querySelectorAll(".chip[data-type]").forEach(c => c.classList.remove("active"));
    render();
  });
}

function toggleArr(arr, val) {
  const i = arr.indexOf(val);
  if (i > -1) arr.splice(i, 1); else arr.push(val);
}

/* ── 更新篩選徽章 ── */
function updateFilterBadge() {
  const total = selectedThemes.length + selectedSpecial.length + selectedMonths.length;
  const badge = document.getElementById("filterActiveBadge");
  badge.textContent = total;
  badge.style.display = total > 0 ? "" : "none";
}

/* ── 手機折疊 ── */
function initFilterToggle() {
  const btn  = document.getElementById("filterToggleBtn");
  const body = document.getElementById("filterBody");
  const chev = document.getElementById("filterChevron");
  if (!btn) return;
  btn.addEventListener("click", () => {
    const open = body.classList.toggle("is-open");
    chev.classList.toggle("is-open", open);
  });
}

/* ════════════════════════════════════════
   資料載入
   ════════════════════════════════════════ */
function init() {
  /* 更新時間 */
  const now = new Date();
  document.getElementById("update-time").textContent =
    "最後更新：" + now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");

  initFilterToggle();

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(res) {
      /* 清洗欄位名（移除換行符號）*/
      const rows = res.data.map(row => {
        const clean = {};
        Object.keys(row).forEach(k => {
          clean[k.replace(/[\r\n]+/g, "").trim()] = String(row[k] || "").trim();
        });
        return clean;
      });

      db = rows.filter(row => row["課程名稱"]);
      setupFilters();
      render();
    },
    error(err) {
      const errHtml =
        '<div class="empty-state">' +
        '<i class="fa-solid fa-triangle-exclamation"></i>' +
        '<div>CSV 載入失敗，請確認網址設定或 Sheet 是否已公開發布</div>' +
        '<small style="font-size:.78rem;margin-top:6px;display:block;">' + escHtml(err.message || String(err)) + '</small>' +
        '</div>';
      document.getElementById("listView").innerHTML = errHtml;
      document.getElementById("cardGrid").innerHTML = errHtml;
      document.getElementById("statusBar").textContent = "載入失敗";
      document.getElementById("update-time").textContent = "資料載入失敗";
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>

<script>
/* ================================================================
   iframe 身高自動通報
   目的：當這個頁面被嵌入 <iframe> 時，主動把目前內容高度
         透過 postMessage 送給外層，讓外層動態調整 iframe 高度，
         避免內容被截斷。
   訊息格式（與外層 listener 一致）：
     { type: "EVENT_BOARD_RESIZE", height: <number> }
   ================================================================ */
(function () {
  if (window.self === window.top) return;

  var lastSent = 0;
  var rafId = null;

  function measure() {
    var b = document.body, h = document.documentElement;
    return Math.max(
      b.scrollHeight, b.offsetHeight,
      h.clientHeight, h.scrollHeight, h.offsetHeight
    );
  }

  function send() {
    rafId = null;
    var h = measure();
    if (Math.abs(h - lastSent) < 5) return;
    lastSent = h;
    try {
      window.parent.postMessage({ type: "EVENT_BOARD_RESIZE", height: h }, "*");
    } catch (e) {}
  }

  function schedule() {
    if (rafId) return;
    rafId = window.requestAnimationFrame(send);
  }

  document.addEventListener("DOMContentLoaded", schedule);
  window.addEventListener("load", schedule);
  window.addEventListener("resize", schedule);

  if ("ResizeObserver" in window) {
    var ro = new ResizeObserver(schedule);
    ro.observe(document.documentElement);
    if (document.body) ro.observe(document.body);
  }

  if ("MutationObserver" in window) {
    var mo = new MutationObserver(schedule);
    document.addEventListener("DOMContentLoaded", function () {
      mo.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        characterData: true
      });
    });
  }

  setInterval(schedule, 1000);

  window.addEventListener("message", function (e) {
    if (e.data && e.data.type === "REQUEST_BOARD_HEIGHT") {
      lastSent = 0;
      schedule();
    }
  }, false);
})();
</script>
