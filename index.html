<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網路課程倒數 · 即將送審的學分</title>
<meta name="description" content="GOGOCARE 網路課程倒數，幫你抓住最後報名機會。">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
/* ── 全域變數（採 Gediter 色系） ── */
:root {
  --primary: #248dc5;
  --primary-dark: #1a6e9e;
  --primary-darker: #135279;
  --accent: #ff5757;
  --accent-dark: #d83a3a;
  --warn: #f59e0b;
  --warn-dark: #d97706;
  --ink: #2a2a2a;
  --ink-2: #4b4b4b;
  --muted: #9fa0a0;
  --line: #dcdddd;
  --bg: #f4f6f8;
  --card-bg: #ffffff;
  --aux-1: #a8acd6;
  --aux-2: #eee800;
  --tag-theme-bg: #eaf4fb;
  --tag-theme-text: #135279;
  --tag-special-bg: #f3eefc;
  --tag-special-text: #6b21a8;
  --thumb-placeholder: #dde1e7;
}

html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
}

/* ── 容器 ── */
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px 40px; }

img { max-width: 100%; height: auto; display: block; }

/* ════════════════════════════════════════
   HERO 倒數狙擊區
   ════════════════════════════════════════ */
.hero-countdown {
  background:
    radial-gradient(circle at 85% 20%, rgba(255,255,255,.08) 0, transparent 45%),
    linear-gradient(135deg, var(--primary) 0%, var(--primary-darker) 100%);
  color: #fff;
  border-radius: 16px;
  padding: 22px 20px;
  margin: 16px -16px 18px;
  box-shadow: 0 8px 24px rgba(36,141,197,.18);
  position: relative;
  overflow: hidden;
}
.hero-inner {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.hero-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}
.hero-text { flex: 1; min-width: 0; }
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.16);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: .04em;
  margin-bottom: 8px;
}
.hero-title {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.25;
  margin: 0 0 8px;
  color: #fff;
}
.hero-title .hero-accent { color: var(--aux-2); }
.hero-subtitle {
  font-size: .92rem;
  color: rgba(255,255,255,.86);
  margin: 0;
  line-height: 1.55;
}
.hero-subtitle strong {
  color: #fff;
  font-weight: 800;
  font-size: 1.05rem;
  padding: 0 2px;
}

.hero-logo {
  flex-shrink: 0;
  height: 64px;
  width: auto;
  max-height: 64px;
  background: #fff;
  border-radius: 10px;
  padding: 6px 10px;
  object-fit: contain;
}

/* HERO 統計卡（單張，紅色強調） */
.hero-stats { display: flex; }
.stat-card {
  flex: 1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 6px 14px rgba(255,87,87,.25);
}
.stat-card-icon {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.stat-card-body { flex: 1; min-width: 0; line-height: 1.25; }
.stat-card-label {
  font-size: .78rem;
  opacity: .92;
  font-weight: 600;
  letter-spacing: .04em;
}
.stat-card-value {
  font-size: 1.6rem;
  font-weight: 800;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.stat-card-unit { font-size: .82rem; opacity: .9; font-weight: 700; }

/* ════════════════════════════════════════
   分區（section-block）
   ════════════════════════════════════════ */
.section-block { margin-bottom: 26px; }
.section-block-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--ink);
  margin: 0 0 12px;
  line-height: 1.3;
  padding-left: 10px;
  border-left: 4px solid var(--primary);
}
.section-block-title .pill {
  background: var(--line);
  color: var(--ink-2);
  font-size: .72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
}
.section-block-sub {
  font-size: .85rem;
  color: var(--muted);
  margin: -6px 0 10px;
  padding-left: 14px;
}

/* 急件區的紅色標題 */
.section-urgent .section-block-title { border-left-color: var(--accent); }
.section-urgent .section-block-title i { color: var(--accent); }

/* 本週主打的橘色標題 */
.section-week .section-block-title { border-left-color: var(--warn-dark); }
.section-week .section-block-title i { color: var(--warn-dark); }

/* 兩週內的藍色標題 */
.section-fortnight .section-block-title { border-left-color: var(--primary); }
.section-fortnight .section-block-title i { color: var(--primary); }

/* 主題分區 / 特找積分大標 */
.group-title {
  font-size: 1rem;
  font-weight: 800;
  color: var(--ink);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.group-title .group-count {
  font-size: .75rem;
  font-weight: 700;
  color: var(--primary-dark);
  background: var(--tag-theme-bg);
  padding: 2px 9px;
  border-radius: 999px;
}
.by-special .group-title .group-count {
  color: var(--tag-special-text);
  background: var(--tag-special-bg);
}

/* ════════════════════════════════════════
   標籤 / 倒數徽章
   ════════════════════════════════════════ */
.tag-theme,
.tag-special {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  border: 1px solid transparent;
}
.tag-theme {
  background: var(--tag-theme-bg);
  color: var(--tag-theme-text);
  border-color: #bcdcef;
}
.tag-special {
  background: var(--tag-special-bg);
  color: var(--tag-special-text);
  border-color: #e0d3f5;
}

.countdown-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
/* 倒數徽章三階：urgent（≤3 天，深紅）／ warn（4–7 天，淺紅）／ ok（>7 天，藍） */
.countdown-urgent { background: #ffe0e0; color: #c0392b; border: 1px solid #f5a3a3; }
.countdown-warn   { background: #fed7d7; color: #e54444; border: 1px solid #fab5b5; }
.countdown-ok     { background: #eaf4fb; color: var(--primary-darker); border: 1px solid #c7e1f0; }

/* ════════════════════════════════════════
   今日 / 48 小時急件大卡
   ════════════════════════════════════════ */
.urgent-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.urgent-card {
  background: var(--card-bg);
  border: 2px solid var(--accent);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 4px 18px rgba(255,87,87,.15);
  animation: urgent-pulse 2s ease-in-out infinite;
  transition: transform .15s;
}
.urgent-card:hover {
  color: inherit;
  transform: translateY(-2px);
}
@keyframes urgent-pulse {
  0%, 100% { box-shadow: 0 4px 18px rgba(255,87,87,.15); }
  50%      { box-shadow: 0 4px 28px rgba(255,87,87,.45); }
}
.urgent-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: var(--thumb-placeholder);
  position: relative;
  flex-shrink: 0;
}
.urgent-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.urgent-thumb .thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-darker) 100%);
  color: rgba(255,255,255,.55); font-size: 2rem;
}
.urgent-flag {
  position: absolute;
  top: 10px; left: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: .04em;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.urgent-body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column;
  gap: 8px;
}
.urgent-title {
  font-size: 1.02rem;
  font-weight: 800;
  line-height: 1.4;
  color: var(--ink);
}
.urgent-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.urgent-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  font-size: .85rem; color: var(--ink-2);
}
.urgent-meta .pts { font-weight: 800; color: var(--ink); }
.urgent-meta .sep { color: var(--line); }

.urgent-hours {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  font-size: .95rem;
  font-weight: 800;
  padding: 6px 14px;
  border-radius: 8px;
  align-self: flex-start;
}
.urgent-hours i { font-size: .9rem; }

.urgent-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: #fafbfc;
}
.deadline-text { font-size: .82rem; color: var(--muted); }
.deadline-text strong { color: var(--ink); font-weight: 700; }

/* CTA 按鈕 */
.btn-goto {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: .85rem;
  font-weight: 700;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn-goto:hover { background: var(--primary-dark); color: #fff; transform: translateY(-1px); }
/* 整卡 hover 時，內嵌的 CTA 視覺按鈕也亮一下（因 .btn-goto 為 <span>，自身 :hover 不會觸發） */
.small-card:hover .btn-goto { background: var(--primary-dark); }
.btn-goto-large {
  background: var(--accent);
  font-size: .95rem;
  font-weight: 800;
  padding: 9px 18px;
}
.btn-goto-large:hover { background: var(--accent-dark); color: #fff; }
.urgent-card:hover .btn-goto-large { background: var(--accent-dark); }
.btn-goto-disabled {
  background: var(--line);
  color: var(--muted);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: .85rem;
  font-weight: 700;
  white-space: nowrap;
}

/* 本週主打卡的強調 — 與兩週內、主題分區做區隔（橘色 hover 邊框） */
.small-card.has-progress:hover {
  border-color: #fbd28a;
  box-shadow: 0 4px 16px rgba(245,158,11,.16);
}
@media (min-width: 768px) {
  .small-card.has-progress:hover {
    box-shadow: 0 6px 22px rgba(245,158,11,.18);
  }
}

/* ════════════════════════════════════════
   小卡（兩週內、主題分區、特找積分共用）
   - 手機（< 768px）：list-item 風格 — 左縮圖 110×82 + 右資訊
   - 桌機（≥ 768px）：course-card 風格 — 16:9 大圖 + 深色 header + footer
   ════════════════════════════════════════ */
.small-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

/* ── 預設：手機 list-item 風格 ── */
.small-card {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex;
  flex-direction: row;
  gap: 12px;
  padding: 12px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  transition: box-shadow .15s, border-color .15s;
}
.small-card:hover {
  color: inherit;
  box-shadow: 0 4px 16px rgba(36,141,197,.10);
  border-color: #bcdcef;
}

.small-thumb {
  flex-shrink: 0;
  width: 110px;
  height: 82px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--thumb-placeholder);
  position: relative;
}
.small-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.small-thumb .thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-darker) 100%);
  color: rgba(255,255,255,.5);
  font-size: 1.4rem;
}

/* 手機不顯示桌機專用的 header / footer */
.small-header,
.small-footer { display: none; }

.small-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 0;
}
.small-title {
  font-size: .92rem;
  font-weight: 700;
  line-height: 1.4;
  color: var(--ink);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.small-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.small-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  font-size: .8rem;
  color: var(--ink-2);
}
.small-meta .pts { font-weight: 700; color: var(--ink); }
.small-meta .sep { color: var(--line); }
.small-meta .countdown-badge { font-size: 11px; padding: 2px 8px; }
.small-meta-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

/* ── 桌機（≥ 768px）：切回 course-card 風格 ── */
@media (min-width: 768px) {
  .small-grid { gap: 18px; }

  .small-card {
    flex-direction: column;
    gap: 0;
    padding: 0;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: box-shadow .18s, transform .18s, border-color .18s;
  }
  .small-card:hover {
    box-shadow: 0 6px 24px rgba(36,141,197,.12);
    transform: translateY(-3px);
    border-color: #93c5fd;
  }

  .small-thumb {
    width: 100%;
    height: auto;
    aspect-ratio: 16 / 9;
    border-radius: 0;
  }
  .small-thumb .thumb-placeholder { font-size: 1.8rem; }

  /* 桌機才出現的深色 header */
  .small-header {
    display: flex;
    background: var(--ink);
    color: rgba(255,255,255,.85);
    padding: 9px 14px;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    font-size: .8rem;
    flex-shrink: 0;
  }
  .small-header-deadline {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .small-header-deadline strong {
    color: #fff;
    font-weight: 800;
    font-size: .92rem;
    letter-spacing: .01em;
  }

  /* 桌機顯示 footer 含 CTA */
  .small-footer {
    display: flex;
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    align-items: center;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  /* 桌機 body：恢復內距與 margin-top 自動 */
  .small-body {
    padding: 12px 14px;
    gap: 7px;
    flex: 1;
  }
  .small-title {
    font-size: .9rem;
    min-height: 2.4em;
  }
  .small-meta {
    font-size: .78rem;
    margin-top: auto;
  }
  /* 桌機的截止日與倒數徽章在 header 顯示，meta 內隱藏 */
  .small-meta .deadline-text,
  .small-meta .sep,
  .small-meta .countdown-badge { display: none; }
}

/* ════════════════════════════════════════
   載入 / 空狀態
   ════════════════════════════════════════ */
.loading-state,
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--muted);
}
.loading-state i,
.empty-state i {
  font-size: 2rem;
  display: block;
  margin-bottom: 10px;
  opacity: .5;
}
.empty-state-mini {
  background: #fff;
  border: 1px dashed var(--line);
  border-radius: 10px;
  padding: 18px 14px;
  text-align: center;
  color: var(--muted);
  font-size: .9rem;
}

/* ════════════════════════════════════════
   頁尾
   ════════════════════════════════════════ */
.page-footer {
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.6;
}
.page-footer a {
  color: var(--primary-dark);
  text-decoration: none;
  font-weight: 700;
}
.page-footer a:hover { text-decoration: underline; }
.page-footer .footer-update { margin-top: 6px; opacity: .85; }

/* ════════════════════════════════════════
   RWD：≥ 768px（平板）
   ════════════════════════════════════════ */
@media (min-width: 768px) {
  .page-wrap { padding: 0 24px 48px; }
  .hero-countdown {
    padding: 28px 28px;
    margin: 20px 0 22px;
  }
  .hero-title { font-size: 28px; }
  .hero-subtitle { font-size: 1rem; }
  .hero-logo { height: 78px; max-height: 78px; }
  .stat-card { padding: 16px 18px; }
  .stat-card-value { font-size: 1.9rem; }

  .urgent-card {
    flex-direction: row;
    align-items: stretch;
  }
  .urgent-card .urgent-thumb {
    width: 360px;
    aspect-ratio: 16 / 11;
    flex-shrink: 0;
  }
  .urgent-card .urgent-body-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .urgent-body { padding: 18px 22px; }
  .urgent-title { font-size: 1.15rem; }
  .urgent-footer { padding: 14px 22px; }

  .small-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .section-block-title { font-size: 1.2rem; }
  .group-title { font-size: 1.05rem; }
}

/* ════════════════════════════════════════
   RWD：≥ 1100px（寬螢幕）
   ════════════════════════════════════════ */
@media (min-width: 1100px) {
  .small-grid { grid-template-columns: repeat(4, 1fr); }
  .hero-title { font-size: 32px; }
}
</style>
</head>

<body>
<div class="page-wrap" id="measure-wrapper">

  <!-- ════════════════════════════════════════
       HERO 倒數狙擊區
       ════════════════════════════════════════ -->
  <section class="hero-countdown" aria-labelledby="hero-title">
    <div class="hero-inner">
      <div class="hero-head">
        <div class="hero-text">
          <span class="hero-eyebrow">
            <i class="fa-solid fa-bullhorn"></i> 即將送審的積分
          </span>
          <h1 class="hero-title" id="hero-title">
            <span class="hero-accent">5/31 送審倒數</span>網路課程精選
          </h1>
        </div>
        <img
          class="hero-logo"
          src="https://www.gogocare.com.tw/UserFiles/uploads/images/20260522165334_3906.jpg"
          alt="GoGoCare"
          loading="lazy"
        >
      </div>

      <div class="hero-stats">
        <div class="stat-card">
          <div class="stat-card-icon"><i class="fa-solid fa-fire"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-label">截止倒數</div>
            <div class="stat-card-value">
              <span id="statTotalValue">—</span>
              <span class="stat-card-unit">堂課程</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       置頂精選：免費限時課程
       ════════════════════════════════════════ -->
  <section class="section-block" style="margin-bottom:18px;">
    <h2 class="section-block-title" style="border-left-color:#f59e0b;">
      <i class="fa-solid fa-gift" style="color:#f59e0b;"></i>免費課程推薦
    </h2>

<script>
/* ════════════════════════════════════════
   設定區
   ════════════════════════════════════════ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrhEmVBEEIZu172SGx2ZdQjxzP9IMXAlGGdPLCY2_-NjXFoHKX5d28pI6b8zZ6xzXslwDtokoPxuX2/pub?gid=1081455974&single=true&output=csv";

/* 硬性截止日 — 整頁只顯示「課程截止日 ≤ END_DATE」的課程
   需要延長/縮短時間範圍時，只改這一行即可（格式：YYYY-MM-DD） */
const END_DATE = "2026-05-31";

/* WINDOW_DAYS 自動由今天到 END_DATE 的天數推算（含當天，最小為 0） */
const WINDOW_DAYS = (function () {
  const d = new Date(END_DATE + "T23:59:59");
  return Math.max(0, Math.ceil((d - new Date()) / 86400000));
})();

/* 與爬蟲分類保持一致 */
const CAT_GROUPS = [
  {
    type: "theme",
    label: "積分主題",
    cats: ["專業課程", "專業品質", "專業倫理", "專業法規", "非積分課程", "積分申請中"]
  },
  {
    type: "special",
    label: "特找積分",
    cats: ["感染管制", "緊急應變", "消防安全", "性別敏感度",
           "原住民族文化敏感度及能力", "多元族群文化敏感度及能力", "其他"]
  }
];

/* ════════════════════════════════════════
   狀態
   ════════════════════════════════════════ */
let db = [];

/* ════════════════════════════════════════
   工具函式
   ════════════════════════════════════════ */
function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function parseMulti(raw) {
  if (!raw) return [];
  return String(raw).split(/[,，、\/／]/).map(s => s.trim()).filter(Boolean);
}

/* 距截止日剩餘天數（今天=0，含當天，已過為負） */
function daysLeft(dateStr) {
  if (!dateStr) return null;
  const d = new Date(String(dateStr).trim());
  if (isNaN(d)) return null;
  d.setHours(23, 59, 59, 0);
  const diff = d - new Date();
  return Math.ceil(diff / 86400000);
}

/* 距截止日剩餘小時數（用於急件區「剩 X 天 Y 小時」） */
function hoursLeft(dateStr) {
  if (!dateStr) return null;
  const d = new Date(String(dateStr).trim());
  if (isNaN(d)) return null;
  d.setHours(23, 59, 59, 0);
  const diff = d - new Date();
  return Math.max(0, Math.ceil(diff / 3600000));
}

/* 是否落在倒數窗口內 */
function withinWindow(row) {
  const d = daysLeft(row["課程截止日"]);
  return d !== null && d >= 0 && d <= WINDOW_DAYS;
}

function fmtDeadline(dateStr) {
  if (!dateStr) return "";
  const d = new Date(String(dateStr).trim());
  if (isNaN(d)) return dateStr;
  return d.getFullYear() + "/" +
    String(d.getMonth()+1).padStart(2,"0") + "/" +
    String(d.getDate()).padStart(2,"0");
}

function onThumbError(img) {
  img.parentNode.innerHTML = '<div class="thumb-placeholder"><i class="fa-solid fa-book-open"></i></div>';
}

function buildThumb(url, title) {
  if (url && url.toLowerCase().startsWith("http")) {
    return '<img src="' + escHtml(url) + '" alt="' + escHtml(title) + '" loading="lazy" onerror="onThumbError(this)">';
  }
  return '<div class="thumb-placeholder"><i class="fa-solid fa-book-open"></i></div>';
}

function buildThemeTags(themes) {
  return themes.map(t => '<span class="tag-theme">' + escHtml(t) + '</span>').join("");
}
function buildSpecialTags(specials) {
  return specials.map(s => '<span class="tag-special">' + escHtml(s) + '</span>').join("");
}

/* 倒數徽章（依剩餘天數分色） */
function buildCountdownBadge(days) {
  if (days === null) return "";
  if (days < 0)  return '<span class="countdown-badge countdown-urgent"><i class="fa-regular fa-clock"></i> 已截止</span>';
  if (days === 0) return '<span class="countdown-badge countdown-urgent"><i class="fa-solid fa-fire"></i> 今天截止</span>';
  if (days <= 3)  return '<span class="countdown-badge countdown-urgent"><i class="fa-solid fa-fire"></i> 剩 ' + days + ' 天</span>';
  if (days <= 7)  return '<span class="countdown-badge countdown-warn"><i class="fa-regular fa-clock"></i> 剩 ' + days + ' 天</span>';
  return '<span class="countdown-badge countdown-ok"><i class="fa-regular fa-clock"></i> 剩 ' + days + ' 天</span>';
}

/* 連結與 target 處理 */
function linkAttrs(link) {
  const isHttp = link && link.toLowerCase().startsWith("http");
  return {
    href: isHttp ? escHtml(link) : "#",
    target: isHttp ? ' target="_blank" rel="noopener"' : "",
    valid: isHttp
  };
}

/* CTA 視覺按鈕（純 <span>，避免巢狀 <a>） */
function buildCtaHtml(valid, label, large) {
  if (!valid) return '<span class="btn-goto-disabled">連結未設定</span>';
  const cls = 'btn-goto' + (large ? ' btn-goto-large' : '');
  return '<span class="' + cls + '"><i class="fa-solid fa-arrow-up-right-from-square"></i> ' + label + '</span>';
}

/* 「剩 X 天 Y 小時」文字（急件區用） */
function buildHoursLeftText(deadline) {
  const h = hoursLeft(deadline);
  if (h === null) return "";
  if (h <= 0) return '<i class="fa-solid fa-hourglass-end"></i> 已截止';
  const d = Math.floor(h / 24);
  const r = h % 24;
  if (d > 0) return '<i class="fa-solid fa-hourglass-half"></i> 剩 ' + d + ' 天 ' + r + ' 小時';
  return '<i class="fa-solid fa-hourglass-half"></i> 剩 ' + r + ' 小時';
}

/* ════════════════════════════════════════
   各種卡片建構
   ════════════════════════════════════════ */
function buildUrgentCard(row) {
  const name     = row["課程名稱"] || "";
  const link     = row["連結"] || "";
  const pts      = row["課程積分"] || "";
  const deadline = row["課程截止日"] || "";
  const thumbUrl = row["縮圖URL"] || "";
  const themes   = parseMulti(row["積分主題"]);
  const specials = parseMulti(row["特殊積分"]);

  const tagHtml = buildThemeTags(themes) + buildSpecialTags(specials);
  const la = linkAttrs(link);
  const hoursTxt = buildHoursLeftText(deadline);

  const cta = buildCtaHtml(la.valid, '立即報名', true);

  return (
    '<a href="' + la.href + '"' + la.target + ' class="urgent-card">' +
      '<div class="urgent-thumb">' +
        buildThumb(thumbUrl, name) +
        '<span class="urgent-flag"><i class="fa-solid fa-fire"></i> 最後機會</span>' +
      '</div>' +
      '<div class="urgent-body-wrap">' +
        '<div class="urgent-body">' +
          '<div class="urgent-title">' + escHtml(name) + '</div>' +
          (tagHtml ? '<div class="urgent-tags">' + tagHtml + '</div>' : '') +
          (hoursTxt ? '<div class="urgent-hours">' + hoursTxt + '</div>' : '') +
          '<div class="urgent-meta">' +
            (pts ? '<span class="pts"><i class="fa-solid fa-star" style="color:var(--warn);font-size:.78rem;"></i> ' + escHtml(pts) + ' 積分</span>' : '') +
            (pts && deadline ? '<span class="sep">·</span>' : '') +
            (deadline ? '<span class="deadline-text">截止 <strong>' + fmtDeadline(deadline) + '</strong></span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="urgent-footer">' +
          '<span class="deadline-text"><i class="fa-regular fa-calendar"></i> ' + (deadline ? fmtDeadline(deadline) : '無截止日') + '</span>' +
          cta +
        '</div>' +
      '</div>' +
    '</a>'
  );
}

function buildWeekCard(row) {
  const name     = row["課程名稱"] || "";
  const link     = row["連結"] || "";
  const pts      = row["課程積分"] || "";
  const deadline = row["課程截止日"] || "";
  const thumbUrl = row["縮圖URL"] || "";
  const themes   = parseMulti(row["積分主題"]);
  const specials = parseMulti(row["特殊積分"]);
  const days     = daysLeft(deadline);

  const tagHtml = buildThemeTags(themes) + buildSpecialTags(specials);
  const la = linkAttrs(link);
  const badgeHtml = buildCountdownBadge(days);
  const deadlineTxt = deadline ? fmtDeadline(deadline) : '';

  const cta = buildCtaHtml(la.valid, '立即報名', false);

  /* 桌機 header：截止日 + 倒數徽章 */
  const headerHtml =
    '<div class="small-header">' +
      '<span class="small-header-deadline">' +
        '<i class="fa-regular fa-calendar"></i>' +
        (deadlineTxt ? '截止 <strong>' + deadlineTxt + '</strong>' : '<span style="opacity:.5">無截止日</span>') +
      '</span>' +
      (badgeHtml || '') +
    '</div>';

  const footerHtml = '<div class="small-footer">' + cta + '</div>';

  const metaHtml =
    '<div class="small-meta">' +
      (pts ? '<span class="pts"><i class="fa-solid fa-star" style="color:var(--warn);font-size:.72rem;"></i> ' + escHtml(pts) + ' 積分</span>' : '') +
      (pts && deadlineTxt ? '<span class="sep">·</span>' : '') +
      (deadlineTxt ? '<span class="deadline-text">截止 <strong>' + deadlineTxt + '</strong></span>' : '') +
      (badgeHtml ? badgeHtml : '') +
    '</div>';

  return (
    '<a href="' + la.href + '"' + la.target + ' class="small-card has-progress">' +
      '<div class="small-thumb">' + buildThumb(thumbUrl, name) + '</div>' +
      headerHtml +
      '<div class="small-body">' +
        '<div class="small-title">' + escHtml(name) + '</div>' +
        (tagHtml ? '<div class="small-tags">' + tagHtml + '</div>' : '') +
        metaHtml +
      '</div>' +
      footerHtml +
    '</a>'
  );
}

function buildSmallCard(row) {
  const name     = row["課程名稱"] || "";
  const link     = row["連結"] || "";
  const pts      = row["課程積分"] || "";
  const deadline = row["課程截止日"] || "";
  const thumbUrl = row["縮圖URL"] || "";
  const themes   = parseMulti(row["積分主題"]);
  const specials = parseMulti(row["特殊積分"]);
  const days     = daysLeft(deadline);

  const tagHtml = buildThemeTags(themes) + buildSpecialTags(specials);
  const la = linkAttrs(link);
  const badgeHtml = buildCountdownBadge(days);
  const deadlineTxt = deadline ? fmtDeadline(deadline) : '';

  const cta = buildCtaHtml(la.valid, '前往報名', false);

  /* 桌機才顯示的深色 header：左截止日 + 右倒數徽章 */
  const headerHtml =
    '<div class="small-header">' +
      '<span class="small-header-deadline">' +
        '<i class="fa-regular fa-calendar"></i>' +
        (deadlineTxt ? '截止 <strong>' + deadlineTxt + '</strong>' : '<span style="opacity:.5">無截止日</span>') +
      '</span>' +
      (badgeHtml || '') +
    '</div>';

  /* 桌機 footer：右側 CTA */
  const footerHtml = '<div class="small-footer">' + cta + '</div>';

  /* 手機 meta 區：積分 · 截止 + 倒數徽章（桌機透過 CSS 隱藏 deadline/sep/countdown） */
  const metaHtml =
    '<div class="small-meta">' +
      (pts ? '<span class="pts"><i class="fa-solid fa-star" style="color:var(--warn);font-size:.72rem;"></i> ' + escHtml(pts) + ' 積分</span>' : '') +
      (pts && deadlineTxt ? '<span class="sep">·</span>' : '') +
      (deadlineTxt ? '<span class="deadline-text">截止 <strong>' + deadlineTxt + '</strong></span>' : '') +
      (badgeHtml ? badgeHtml : '') +
    '</div>';

  return (
    '<a href="' + la.href + '"' + la.target + ' class="small-card">' +
      '<div class="small-thumb">' + buildThumb(thumbUrl, name) + '</div>' +
      headerHtml +
      '<div class="small-body">' +
        '<div class="small-title">' + escHtml(name) + '</div>' +
        (tagHtml ? '<div class="small-tags">' + tagHtml + '</div>' : '') +
        metaHtml +
      '</div>' +
      footerHtml +
    '</a>'
  );
}

/* ════════════════════════════════════════
   各區渲染
   ════════════════════════════════════════ */
function sortByDaysAsc(list) {
  return list.slice().sort((a, b) => {
    const da = daysLeft(a["課程截止日"]);
    const dbv = daysLeft(b["課程截止日"]);
    if (da === null && dbv === null) return 0;
    if (da === null) return 1;
    if (dbv === null) return -1;
    return da - dbv;
  });
}

function renderHero(list) {
  document.getElementById("statTotalValue").textContent = list.length;
}

function renderUrgentToday(list) {
  const sub = sortByDaysAsc(list.filter(r => {
    const d = daysLeft(r["課程截止日"]);
    return d !== null && d >= 0 && d <= 2;
  }));
  const sec = document.getElementById("urgentToday");
  const wrap = document.getElementById("urgentTodayList");
  const count = document.getElementById("urgentTodayCount");
  if (!sub.length) { sec.style.display = "none"; return; }
  sec.style.display = "";
  count.textContent = sub.length + " 門";
  wrap.innerHTML = sub.map(buildUrgentCard).join("");
}

function renderUrgentWeek(list) {
  const sub = sortByDaysAsc(list.filter(r => {
    const d = daysLeft(r["課程截止日"]);
    return d !== null && d >= 3 && d <= 7;
  }));
  const sec = document.getElementById("urgentWeek");
  const wrap = document.getElementById("urgentWeekList");
  const count = document.getElementById("urgentWeekCount");
  if (!sub.length) { sec.style.display = "none"; return; }
  sec.style.display = "";
  count.textContent = sub.length + " 門";
  wrap.innerHTML = sub.map(buildWeekCard).join("");
}

function renderUrgentFortnight(list) {
  const sub = sortByDaysAsc(list.filter(r => {
    const d = daysLeft(r["課程截止日"]);
    return d !== null && d >= 8 && d <= 14;
  }));
  const sec = document.getElementById("urgentFortnight");
  const wrap = document.getElementById("urgentFortnightList");
  const count = document.getElementById("urgentFortnightCount");
  if (!sub.length) { sec.style.display = "none"; return; }
  sec.style.display = "";
  count.textContent = sub.length + " 門";
  wrap.innerHTML = sub.map(buildSmallCard).join("");
}

/* 情境分區共用：按指定欄位 + 分類清單分組 */
function renderByGroup(list, group, containerId, iconClass) {
  const container = document.getElementById(containerId);
  const longList = list.filter(r => {
    const d = daysLeft(r["課程截止日"]);
    return d !== null && d >= 15 && d <= WINDOW_DAYS;
  });
  if (!longList.length) { container.innerHTML = ""; return; }

  const field = group.type === "theme" ? "積分主題" : "特殊積分";

  /* 為每個分類收集屬於它的課程 */
  const buckets = group.cats.map(cat => {
    const matched = longList.filter(r => parseMulti(r[field]).includes(cat));
    return { cat: cat, list: sortByDaysAsc(matched) };
  }).filter(b => b.list.length > 0);

  if (!buckets.length) { container.innerHTML = ""; return; }

  const html = buckets.map(b => {
    const cards = b.list.map(buildSmallCard).join("");
    return (
      '<div class="section-block">' +
        '<h3 class="group-title">' +
          '<i class="' + iconClass + '"></i>' +
          escHtml(b.cat) +
          '<span class="group-count">' + b.list.length + ' 門</span>' +
        '</h3>' +
        '<div class="small-grid">' + cards + '</div>' +
      '</div>'
    );
  }).join("");

  container.innerHTML = html;
}

function renderByTheme(list) {
  renderByGroup(list, CAT_GROUPS[0], "byTheme", "fa-solid fa-graduation-cap");
}

function renderBySpecial(list) {
  renderByGroup(list, CAT_GROUPS[1], "bySpecial", "fa-solid fa-star");
}

/* ════════════════════════════════════════
   主渲染入口
   ════════════════════════════════════════ */
function renderAll() {
  const inWindow = db.filter(withinWindow);

  renderHero(inWindow);
  renderUrgentToday(inWindow);
  renderUrgentWeek(inWindow);
  renderUrgentFortnight(inWindow);
  renderByTheme(inWindow);
  renderBySpecial(inWindow);

  /* 全空提示 */
  document.getElementById("globalEmpty").style.display = inWindow.length ? "none" : "";
  document.getElementById("loadingState").style.display = "none";
}

/* ════════════════════════════════════════
   資料載入
   ════════════════════════════════════════ */
function init() {
  const now = new Date();
  document.getElementById("update-time").textContent =
    "最後更新：" + now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");

  /* 依 END_DATE 動態填入頁尾與空狀態的提示文案 */
  const endDateTxt = fmtDeadline(END_DATE);
  document.getElementById("footerNote").innerHTML =
    '本頁僅顯示截止日於 <strong>' + endDateTxt + '</strong> 前的網路課程，需要查看全部請至 ' +
    '<a href="https://www.gogocare.com.tw/tw/course/list.html" target="_blank" rel="noopener">GOGOCARE 課程總表</a>。';
  document.getElementById("globalEmptyText").textContent =
    "目前 " + endDateTxt + " 前沒有即將截止的網路課程，請持續關注。";

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete(res) {
      const rows = res.data.map(row => {
        const clean = {};
        Object.keys(row).forEach(k => {
          clean[k.replace(/[\r\n]+/g, "").trim()] = String(row[k] || "").trim();
        });
        return clean;
      });
      db = rows.filter(row => row["課程名稱"]);
      renderAll();
    },
    error(err) {
      document.getElementById("loadingState").innerHTML =
        '<i class="fa-solid fa-triangle-exclamation"></i>' +
        '<div>CSV 載入失敗，請確認網址設定或 Sheet 是否已公開發布</div>' +
        '<small style="font-size:.78rem;margin-top:6px;display:block;">' + escHtml(err.message || String(err)) + '</small>';
      document.getElementById("update-time").textContent = "資料載入失敗";
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>

  此頁面與「網路課程.html」共用同一份 Google Sheet 公開 CSV（網路課程課表），

    A: 連結  B: 課程名稱  C: 課程積分  D: 課程截止日
    E: 送審倒數  F: 積分主題  G: 特殊積分  H: 縮圖URL
  ═══════════════════════════════════════════════════════════════════════
-->

<script>
/* ════════════════════════════════════════
   iframe 身高自動通報（沿用網路課程.html 的穩健作法）
   只測量 #measure-wrapper 的「實際底部位置」，
   避免「iframe 變高 → body 也被撐高 → 又回報更大高度」的無限增長迴圈。
   訊息格式：{ type: "EVENT_BOARD_RESIZE", height: <number> }
   ════════════════════════════════════════ */
(function () {
  if (window.self === window.top) return;

  var lastSent = 0;
  var notifyTimer = null;

  function getActualContentHeight() {
    var w = document.getElementById("measure-wrapper");
    if (!w) return 0;
    return Math.ceil(w.getBoundingClientRect().bottom);
  }

  function notifyHeight() {
    var h = getActualContentHeight();
    if (h < 100) return;
    if (Math.abs(h - lastSent) < 10) return;
    lastSent = h;
    try {
      window.parent.postMessage({ type: "EVENT_BOARD_RESIZE", height: h }, "*");
    } catch (e) {}
  }

  function scheduleNotify() {
    if (notifyTimer) clearTimeout(notifyTimer);
    notifyTimer = setTimeout(notifyHeight, 100);
  }

  document.addEventListener("DOMContentLoaded", scheduleNotify);
  window.addEventListener("load", scheduleNotify);
  window.addEventListener("resize", scheduleNotify);

  if ("ResizeObserver" in window) {
    document.addEventListener("DOMContentLoaded", function () {
      var w = document.getElementById("measure-wrapper");
      if (w) new ResizeObserver(scheduleNotify).observe(w);
    });
  }

  window.addEventListener("message", function (e) {
    if (e.data && e.data.type === "REQUEST_BOARD_HEIGHT") {
      lastSent = 0;
      scheduleNotify();
    }
  }, false);
})();
</script>
